<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fav Date ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Caveat:wght@500;700&family=Pinyon+Script&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cimen-koyu:#0e2213;
  --cimen:#1e3d24;
  --cimen-acik:#2f5233;
  --kirmizi:#a63a2e;
  --kirmizi-koyu:#7e2a20;
  --bordo:#5e1d16;
  --krem:#faf3e3;
  --kagit:#fffdf6;
  --gunes:#e9b64c;
  --murekkep:#3f3428;
  --mantar:#c89b66;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Quicksand',sans-serif;color:var(--krem);
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen) 40%,var(--cimen-acik) 120%);
  overflow-x:hidden;
}
body.kilitli{overflow:hidden;height:100svh}
/* çimen dokusu */
.cimenli{position:relative}
.cimenli::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.15;
  background:repeating-linear-gradient(88deg, transparent 0 7px, rgba(15,45,20,.9) 7px 8px),
             repeating-linear-gradient(92deg, transparent 0 11px, rgba(90,140,85,.35) 11px 12px);
}
.bolum{
  position:relative;min-height:100svh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 20px;gap:22px;text-align:center;
}
.el{font-family:'Caveat',cursive;font-weight:700}
.zarif{font-family:'Pinyon Script',cursive;font-weight:400}
.altbaslik{font-family:'Caveat',cursive;font-size:clamp(1.4rem,5vw,2rem);color:var(--gunes)}
p{font-size:clamp(.95rem,3.6vw,1.08rem);max-width:560px;line-height:1.75;opacity:.93}
.ipucu{font-size:.78rem;opacity:.55;letter-spacing:1.2px;text-transform:uppercase}
.ok{font-size:1.5rem;opacity:.6;animation:zipla 1.8s ease-in-out infinite}
@keyframes zipla{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}

/* kaydırınca belirme sistemi */
.belir{opacity:0;transform:translateY(36px);transition:opacity .9s ease, transform .9s cubic-bezier(.22,.9,.3,1)}
.belir.g{opacity:1;transform:translateY(0)}
.belir.soldan{transform:translateX(-46px)}
.belir.sagdan{transform:translateX(46px)}
.belir.soldan.g,.belir.sagdan.g{transform:translateX(0)}
.b1{transition-delay:.08s}.b2{transition-delay:.2s}.b3{transition-delay:.34s}.b4{transition-delay:.48s}.b5{transition-delay:.62s}.b6{transition-delay:.76s}

/* pötikare */
.potikare{
  background:
    repeating-linear-gradient(0deg, rgba(166,58,46,.5) 0 16px, transparent 16px 32px),
    repeating-linear-gradient(90deg, rgba(166,58,46,.5) 0 16px, transparent 16px 32px),
    var(--krem);
}
.dikisli{position:relative}
.dikisli::after{content:"absolute";inset:7px;border:2px dashed rgba(126,42,32,.5);border-radius:inherit;pointer-events:none}

/* ============ KİLİT EKRANI (sabit katman) ============ */
#kilitKatman{
  position:fixed;inset:0;z-index:100;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .9s ease, visibility .9s, transform .9s ease;
  padding:24px;text-align:center;
}
#kilitKatman .fon{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-image:
    radial-gradient(ellipse at 50% -20%, rgba(233,182,76,.10), transparent 55%),
    linear-gradient(180deg, var(--cimen-koyu), var(--cimen));
}
#kilitKatman .perde{position:absolute;inset:0;background:rgba(8,20,11,.55);backdrop-filter:blur(5px)}
#kilitKatman > *:not(.fon):not(.perde){position:relative;z-index:2}
#kilitKatman.acildi{opacity:0;visibility:hidden;transform:scale(1.14)}
.kilit-baslik{font-family:'Pinyon Script',cursive;font-size:clamp(2.2rem,9vw,3.4rem);text-shadow:0 2px 14px rgba(0,0,0,.55)}

/* kalp asma kilit */
.asma-kilit{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 22px 40px rgba(0,0,0,.55))}
.kanca{
  width:104px;height:88px;margin-bottom:-40px;
  border:15px solid #93ac8d;border-bottom:none;border-radius:60px 60px 0 0;
  box-shadow:inset 0 3px 4px rgba(255,255,255,.45), inset 0 -4px 6px rgba(20,40,25,.55);
  transform-origin:14px 100%;
  transition:transform .55s cubic-bezier(.3,1.5,.5,1);
}
.asma-kilit.acik .kanca{transform:translateY(-34px) rotate(-16deg)}
.kilit-govde{
  position:relative;width:min(230px,62vw);aspect-ratio:1;
  clip-path:url(#kalpKlip);
  background:linear-gradient(150deg,#55895e,#2f5a3b 52%,#1c3a26);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:6%;gap:12px;
}
.kilit-govde::before{
  content:"";position:absolute;left:14%;top:8%;width:34%;height:26%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(255,255,255,.28), transparent 70%);
  pointer-events:none;
}
.haneler{display:flex;gap:9px}
.hane{
  width:32px;height:42px;border-radius:8px;
  background:rgba(250,243,227,.13);border:1.5px solid rgba(250,243,227,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;font-weight:600;color:var(--krem);
  transition:all .18s;
}
.hane.dolu{background:var(--gunes);border-color:var(--gunes);color:var(--cimen-koyu);box-shadow:0 0 14px rgba(233,182,76,.65)}
.delikk{width:15px;height:15px;border-radius:50%;background:rgba(8,22,12,.8);position:relative}
.delikk::after{content:"";position:absolute;left:50%;top:11px;transform:translateX(-50%);width:10px;height:13px;background:rgba(8,22,12,.8);clip-path:polygon(32% 0,68% 0,100% 100%,0 100%)}
.asma-kilit.hata{animation:salla .45s ease}
.tus-takimi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tus{
  width:62px;height:62px;border-radius:50%;cursor:pointer;color:var(--krem);
  font-size:1.4rem;font-weight:500;font-family:'Quicksand',sans-serif;
  background:rgba(250,243,227,.12);border:1px solid rgba(250,243,227,.3);
  backdrop-filter:blur(4px);
  transition:background .15s, transform .1s;
}
.tus:active{background:rgba(233,182,76,.3);transform:scale(.92)}
.tus.yardimci{font-size:1rem;background:transparent;border-color:transparent}
@keyframes salla{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-11px)}40%,80%{transform:translateX(11px)}}
#sifreMesaj{font-size:.85rem;min-height:1.2em;color:var(--gunes);text-shadow:0 1px 6px rgba(0,0,0,.6)}

/* dikişli kırmızı buton */
.buton{
  font-family:'Quicksand',sans-serif;font-weight:600;font-size:1rem;
  padding:14px 32px;border-radius:10px;cursor:pointer;color:var(--krem);
  background:linear-gradient(165deg,#b5473a,var(--kirmizi) 60%,var(--kirmizi-koyu));
  border:none;outline:2px dashed rgba(250,243,227,.75);outline-offset:-6px;
  box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .18s ease;
}
.buton:active{transform:scale(.95)}

/* ============ 0. AÇILIŞ: TAM SAYFA FOTOĞRAF ============ */
#acilis{padding:24px}
.acilis-fon{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-image:linear-gradient(180deg, var(--cimen-koyu), var(--cimen) 70%);
  animation:yavasZoom 9s ease-out forwards;
}
@keyframes yavasZoom{from{transform:scale(1.07)}to{transform:scale(1)}}
.acilis-perde{position:absolute;inset:0;background:linear-gradient(180deg, rgba(8,20,11,.30) 0%, rgba(8,20,11,.42) 55%, rgba(8,20,11,.72) 100%)}
#acilis > *:not(.acilis-fon):not(.acilis-perde){position:relative;z-index:2}
.acilis-baslik{
  font-family:'Pinyon Script',cursive;font-weight:400;
  font-size:clamp(2.7rem,12vw,5.4rem);line-height:1.15;max-width:14ch;
  text-shadow:0 3px 22px rgba(0,0,0,.75), 0 1px 4px rgba(0,0,0,.6);
}
.acilis-alt{font-family:'Caveat',cursive;font-size:clamp(1.3rem,5vw,1.9rem);color:var(--gunes);text-shadow:0 2px 10px rgba(0,0,0,.7)}
#acilis .ok{position:absolute;bottom:26px;left:50%;transform:translateX(-50%)}

/* ============ 1. BÖLÜM: PİKNİK SERME ============ */
.kavis{width:min(560px,94vw);margin-bottom:-26px}
.kavis text{font-family:'Alfa Slab One',serif;font-size:42px;fill:var(--krem);letter-spacing:1px}
.kavis .golge{fill:rgba(0,0,0,.35);transform:translate(2px,3px)}
.serme{
  position:relative;width:min(620px,94vw);border-radius:10px;
  padding:clamp(22px,5vw,40px);
  transform:rotate(-1.2deg);
  box-shadow:0 30px 70px rgba(0,0,0,.55);
}
.serme-ic{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(10px,3vw,24px)}
.sepet-buyuk{font-size:clamp(4.4rem,17vw,7rem);filter:drop-shadow(0 12px 20px rgba(0,0,0,.35));transform:rotate(-3deg)}
.meyve{position:absolute;font-size:1.5rem;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.cicek-sol{position:absolute;left:-8px;top:-14px;font-size:2.2rem;transform:rotate(-20deg)}
.cicek-sag{position:absolute;right:-6px;bottom:-12px;font-size:2rem;transform:rotate(15deg)}

/* kaset */
.kaset{
  position:relative;width:150px;height:94px;border-radius:8px;transform:rotate(4deg);
  background:linear-gradient(170deg,#2b2b2b,#151515);
  box-shadow:0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink:0;
}
.kaset .etiket{
  position:absolute;left:10px;right:10px;top:9px;height:46px;border-radius:4px;
  background:linear-gradient(180deg,var(--krem),#efe4c8);
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:1.05rem;color:var(--kirmizi);font-weight:700;
}
.kaset .etiket::before{content:"";position:absolute;top:5px;left:8px;right:8px;height:3px;background:repeating-linear-gradient(90deg,var(--kirmizi) 0 8px,transparent 8px 14px);opacity:.5}
.kaset .makara{position:absolute;bottom:12px;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#0a0a0a 34%,#3a3a3a 36% 60%,#0a0a0a 62%);border:2px solid #444}
.kaset .makara.m1{left:26px}.kaset .makara.m2{right:26px}
.kaset .vida{position:absolute;width:5px;height:5px;border-radius:50%;background:#555}
.kaset .vida:nth-of-type(4){left:5px;top:5px}.kaset .vida:nth-of-type(5){right:5px;top:5px}
.kaset .vida:nth-of-type(6){left:5px;bottom:5px}.kaset .vida:nth-of-type(7){right:5px;bottom:5px}

/* fotoğraf makinesi */
.makine{
  position:relative;width:132px;height:88px;border-radius:12px;transform:rotate(-5deg);flex-shrink:0;
  background:linear-gradient(180deg,#8a6f52 0 34%, #3b3128 34%);
  box-shadow:0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.2);
}
.makine .objektif{
  position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #7fa3b5 6%, #23404e 40%, #0d1b22 70%);
  border:5px solid #d9cfc0;box-shadow:0 3px 8px rgba(0,0,0,.4);
}
.makine .vizor{position:absolute;left:12px;top:7px;width:22px;height:13px;border-radius:3px;background:#1c1712;border:2px solid #d9cfc0}
.makine .flas{position:absolute;right:14px;top:8px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #fff8e0, #b3a37a)}
.makine .dugme{position:absolute;right:26px;top:-7px;width:18px;height:9px;border-radius:3px;background:#c2402f}

/* mini zarf (sermede duran) */
.mini-zarf{
  position:relative;width:118px;height:80px;transform:rotate(6deg);flex-shrink:0;
  background:linear-gradient(170deg,#b5473a,var(--kirmizi-koyu));border-radius:6px;
  box-shadow:0 10px 24px rgba(0,0,0,.4);
}
.mini-zarf::before{content:"";position:absolute;inset:0;clip-path:polygon(0 0, 50% 52%, 100% 0);background:#c6584a;border-radius:6px 6px 0 0}
.mini-zarf .pul{position:absolute;left:50%;top:34px;transform:translateX(-50%);font-size:1.15rem}

/* ============ 2. BÖLÜM: ŞARKI ============ */
#sarki{background:linear-gradient(180deg, rgba(10,22,12,.55), rgba(10,22,12,.75)), var(--cimen-koyu)}
.sarki-duzen{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(24px,5vw,54px);width:min(860px,94vw)}
.plak-kutu{position:relative}
.plak{
  width:min(240px,62vw);aspect-ratio:1;border-radius:50%;position:relative;cursor:pointer;
  background:repeating-radial-gradient(circle, #171411 0 2.4px, #262119 2.4px 4.4px);
  box-shadow:0 22px 48px rgba(0,0,0,.65), inset 0 0 26px rgba(0,0,0,.85);
  animation:don 5s linear infinite;animation-play-state:paused;
}
.plak.donuyor{animation-play-state:running}
@keyframes don{to{transform:rotate(360deg)}}
.plak .orta{
  position:absolute;inset:30%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #c6584a, var(--kirmizi) 60%, var(--kirmizi-koyu));
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:1rem;color:var(--krem);line-height:1.15;padding:10px;
}
.plak .delik{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--cimen-koyu)}
.plak-alt{margin-top:14px;font-family:'Caveat',cursive;font-size:1.3rem;color:var(--gunes)}
.calar{
  width:min(420px,90vw);border-radius:12px;overflow:hidden;
  background:#101010;border:6px solid var(--krem);
  box-shadow:0 22px 50px rgba(0,0,0,.6);
  transform:rotate(1.2deg);
}
.calar .ust-serit{display:flex;align-items:center;gap:8px;background:var(--krem);padding:8px 12px;color:var(--murekkep);font-family:'Caveat',cursive;font-size:1.15rem;text-align:left}
.calar .ust-serit .yuvarlak{width:10px;height:10px;border-radius:50%}
.calar iframe{display:block;width:100%;aspect-ratio:16/9;border:0}
.calar .sahte{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:radial-gradient(circle at 50% 40%, #232323, #0c0c0c)}
.calar .sahte .oynat{width:64px;height:64px;border-radius:50%;background:var(--kirmizi);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--krem);box-shadow:0 8px 20px rgba(0,0,0,.5)}
.calar .sahte .ad{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--krem)}
.calar .sahte .sanatci{font-size:.85rem;opacity:.65}

/* ============ 3. BÖLÜM: KALP MADALYON + NEDENLER ============ */
#madalyon .zemin{
  position:relative;width:min(720px,94vw);border-radius:10px;
  padding:clamp(26px,6vw,52px) clamp(14px,4vw,40px);
  transform:rotate(.8deg);box-shadow:0 30px 70px rgba(0,0,0,.55);
}
.kalpler{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap}
.kalp-cerceve{position:relative;width:clamp(140px,38vw,190px);aspect-ratio:1;filter:drop-shadow(0 12px 22px rgba(0,0,0,.4))}
.kalp-cerceve .altin{position:absolute;inset:0;clip-path:url(#kalpKlip);background:linear-gradient(140deg,#f0d48a,#c99b3f 55%,#a4762a)}
.kalp-cerceve .ic{position:absolute;inset:7%;clip-path:url(#kalpKlip);background:var(--cimen);overflow:hidden;display:flex;align-items:center;justify-content:center}
.kalp-cerceve .ic img{width:100%;height:100%;object-fit:cover}
.kalp-cerceve .yertutucu{font-family:'Caveat',cursive;font-size:1.05rem;color:#cfe3c4;padding:20%}
.zincir{font-size:1.3rem;letter-spacing:-2px;color:#c99b3f;text-shadow:0 2px 4px rgba(0,0,0,.35)}
.madalyon-cicek{position:absolute;font-size:1.9rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.notlar{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:26px}
.not{
  position:relative;width:clamp(140px,42vw,168px);min-height:104px;padding:20px 13px 13px;
  background:linear-gradient(170deg,#b5473a,var(--kirmizi));color:var(--krem);
  font-family:'Caveat',cursive;font-size:1.18rem;line-height:1.25;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 22px rgba(0,0,0,.4);
}
.not::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-2deg);width:58px;height:18px;background:rgba(250,243,227,.55);box-shadow:inset 0 0 5px rgba(0,0,0,.12)}
.not:nth-child(odd){transform:rotate(-2.4deg)}
.not:nth-child(even){transform:rotate(2deg)}

/* ============ 4. BÖLÜM: ZARF ============ */
.zarf-ortu{position:relative;width:min(430px,92vw);padding:46px 22px 46px;border-radius:8px;transform:rotate(-1deg);box-shadow:0 28px 64px rgba(0,0,0,.55);display:flex;justify-content:center}
.zarf{position:relative;width:230px;height:154px;cursor:pointer;transform:rotate(1.5deg);transition:transform .3s}
.zarf:active{transform:rotate(1.5deg) scale(.97)}
.zarf .arka{position:absolute;inset:0;background:linear-gradient(170deg,#b5473a,var(--kirmizi-koyu));border-radius:8px;box-shadow:0 14px 30px rgba(0,0,0,.45)}
.zarf .mektupcuk{
  position:absolute;left:11px;right:11px;top:9px;height:132px;background:var(--kagit);border-radius:4px;
  display:flex;align-items:center;justify-content:center;z-index:1;
  font-family:'Caveat',cursive;font-size:1.3rem;color:var(--kirmizi);
  transition:transform .95s ease .55s;padding:10px;line-height:1.3;
}
.zarf .on{position:absolute;left:0;right:0;bottom:0;height:84px;z-index:2;background:linear-gradient(180deg,#c6584a,var(--kirmizi));border-radius:0 0 8px 8px;clip-path:polygon(0 0, 50% 46%, 100% 0, 100% 100%, 0 100%)}
.zarf .kapak{
  position:absolute;top:0;left:0;width:0;height:0;z-index:3;
  border-left:115px solid transparent;border-right:115px solid transparent;
  border-top:82px solid #d3695b;
  transform-origin:top;transition:transform .7s ease;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
}
.zarf .muhur{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:4;
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #f0c96a, var(--gunes) 55%, #b07f24);
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 3px 10px rgba(0,0,0,.4);transition:opacity .4s, transform .4s;
}
.zarf.acik .kapak{transform:rotateX(180deg);z-index:1}
.zarf.acik .muhur{opacity:0;transform:translateX(-50%) scale(1.6)}
.zarf.acik .mektupcuk{transform:translateY(-84px)}
.papatya{position:absolute;font-size:1.7rem;filter:drop-shadow(0 4px 7px rgba(0,0,0,.3))}

/* ============ 5. BÖLÜM: MEKTUP ============ */
#mektup{background:linear-gradient(180deg,var(--bordo),#4a150f)}
#mektup::before{content:"";position:absolute;inset:0;opacity:.25;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(166,58,46,.55) 0 18px, transparent 18px 36px),
             repeating-linear-gradient(90deg, rgba(166,58,46,.55) 0 18px, transparent 18px 36px)}
.mektup-kagit{
  position:relative;width:min(560px,92vw);
  background:linear-gradient(165deg,#fffef9,var(--kagit));
  color:var(--murekkep);border-radius:4px;padding:36px 30px 30px;text-align:left;
  font-family:'Caveat',cursive;font-size:1.42rem;line-height:1.55;
  box-shadow:0 26px 60px rgba(0,0,0,.6);transform:rotate(-1deg);
}
.mektup-kagit h3{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.9rem,7vw,2.6rem);color:var(--kirmizi);text-align:center;margin-bottom:16px}
.mektup-kagit .imza{text-align:right;margin-top:16px;font-size:1.55rem;color:var(--kirmizi)}
.mektup-kagit .kose{position:absolute;font-size:1.6rem}
.mektup-kagit .opucuk{position:absolute;right:22px;bottom:-16px;font-size:2rem;transform:rotate(-14deg)}

/* ============ 6. BÖLÜM: POLAROİDLER ============ */
#anilar{background:linear-gradient(180deg,#4a150f,var(--bordo))}
.polaroidler{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(14px,3.5vw,30px);max-width:1000px}
.kart{
  width:clamp(160px,42vw,210px);background:var(--kagit);border-radius:3px;
  padding:11px 11px 0;box-shadow:0 16px 38px rgba(0,0,0,.5);
  display:flex;flex-direction:column;position:relative;
}
.kart:nth-child(odd){transform:rotate(-2.6deg)}
.kart:nth-child(even){transform:rotate(2.2deg)}
.kart .foto{aspect-ratio:1;background:var(--cimen);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.kart .foto img{width:100%;height:100%;object-fit:cover}
.kart .yertutucu{font-family:'Caveat',cursive;font-size:1.15rem;color:#cfe3c4;padding:12px}
.kart .altyazi{font-family:'Caveat',cursive;font-size:1.22rem;color:var(--murekkep);padding:9px 4px 12px;text-align:center}
.kart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:82px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}

/* ============ 7. BÖLÜM: MANTAR PANO ============ */
.pano{
  position:relative;width:min(620px,94vw);border-radius:14px;
  padding:clamp(26px,6vw,46px) clamp(18px,5vw,40px);
  background:
    radial-gradient(circle at 22% 28%, rgba(90,60,30,.28) 0 2px, transparent 3px),
    radial-gradient(circle at 68% 62%, rgba(90,60,30,.25) 0 2px, transparent 3px),
    radial-gradient(circle at 44% 80%, rgba(90,60,30,.22) 0 2px, transparent 3px),
    linear-gradient(165deg,#d3a873,var(--mantar));
  background-size:52px 52px, 64px 64px, 58px 58px, 100% 100%;
  border:12px solid #7a5230;
  box-shadow:0 30px 70px rgba(0,0,0,.55), inset 0 0 40px rgba(80,50,20,.35);
  transform:rotate(-.6deg);
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.pano-not{
  position:relative;background:var(--kagit);color:var(--murekkep);
  font-family:'Caveat',cursive;font-size:clamp(1.25rem,4.6vw,1.5rem);line-height:1.45;
  padding:24px 20px 18px;max-width:440px;box-shadow:0 10px 24px rgba(0,0,0,.35);
  transform:rotate(1.4deg);
}
.pano-not::before{content:"📌";position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:1.5rem;filter:drop-shadow(0 3px 4px rgba(0,0,0,.3))}
.pano .yildiz{position:absolute;color:var(--kirmizi);font-size:1.1rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.cep{
  position:relative;width:150px;height:118px;border-radius:8px 8px 16px 16px;transform:rotate(-2.5deg);
  background:linear-gradient(170deg,#3f5c7a,#2c415a);
  box-shadow:0 10px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
.cep::before{content:"";position:absolute;inset:8px;border:2px dashed rgba(233,196,120,.75);border-radius:6px 6px 12px 12px}
.cep .kucuk-not{
  position:absolute;left:50%;top:-24px;transform:translateX(-50%) rotate(3deg);
  background:var(--kagit);color:var(--kirmizi);font-family:'Caveat',cursive;font-size:1rem;
  padding:7px 12px;box-shadow:0 6px 14px rgba(0,0,0,.3);white-space:nowrap;
}
#finalBaslik{font-family:'Pinyon Script',cursive;font-size:clamp(2.8rem,12vw,4.6rem);background:linear-gradient(90deg,var(--krem),var(--gunes),var(--krem));background-size:200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:parla 4.5s linear infinite}
@keyframes parla{to{background-position:200%}}

/* ============ ZAMAN TÜNELİ (tam ekran galeri) ============ */
body.tunelde{overflow:hidden;height:100svh}
.tunel{
  position:fixed;inset:0;z-index:120;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen));
}
.tunel.acik{display:flex}
.tunel-ust{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;flex-shrink:0;
  background:rgba(10,24,14,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(250,243,227,.15);
}
.tunel-ust h2{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.7rem,6.5vw,2.4rem);color:var(--krem)}
.kapat{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;cursor:pointer;
  border:1px solid rgba(250,243,227,.35);background:rgba(250,243,227,.09);
  color:var(--krem);font-size:1.15rem;line-height:1;
  transition:background .15s, transform .1s;
}
.kapat:active{background:rgba(166,58,46,.5);transform:scale(.92)}
.tunel-icerik{
  overflow-y:auto;flex:1;width:100%;
  padding:28px clamp(14px,4vw,32px) 70px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,86vw),1fr));
  gap:30px 24px;align-items:start;
  max-width:1100px;margin:0 auto;
}
.anikart{
  position:relative;background:var(--kagit);border-radius:4px;
  padding:12px 12px 14px;color:var(--murekkep);
  box-shadow:0 14px 32px rgba(0,0,0,.45);
}
.anikart:nth-child(odd){transform:rotate(-1.1deg)}
.anikart:nth-child(even){transform:rotate(1deg)}
.anikart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:84px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.anikart img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;background:var(--cimen);display:block}
.anikart .bos{aspect-ratio:4/3;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.3rem;color:#cfe3c4;padding:16px;text-align:center}
.anikart .tarih{font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.04rem;letter-spacing:.3px;color:var(--kirmizi-koyu);margin:13px 2px 3px}
.anikart .aciklama{font-family:'Caveat',cursive;font-size:1.28rem;line-height:1.35;color:var(--murekkep);padding:0 2px}

/* ============ 8. BÖLÜM: HEDİYELER (dantel kart) ============ */
#hediyeler{background:linear-gradient(180deg,#3f120d,var(--bordo) 60%,#4a150f)}
.dantel{
  position:relative;width:min(660px,94vw);
  background:linear-gradient(160deg,#fcf7e9,var(--krem));
  border:11px dotted #47130e;border-radius:26px;
  padding:clamp(28px,6vw,48px) clamp(16px,4vw,40px);
  box-shadow:0 28px 64px rgba(0,0,0,.55);
  transform:rotate(-.5deg);
}
.dantel::after{content:"";position:absolute;inset:13px;border:1.5px dashed rgba(126,42,32,.5);border-radius:12px;pointer-events:none}
.dantel-ust{font-family:'Pinyon Script',cursive;font-size:clamp(1.7rem,6.5vw,2.3rem);color:var(--kirmizi)}
.dantel-alt{font-family:'Pinyon Script',cursive;font-size:clamp(2rem,8vw,3rem);color:var(--kirmizi);margin-top:14px}
.hediye-sira{display:flex;justify-content:center;align-items:flex-end;gap:clamp(16px,5vw,46px);flex-wrap:wrap;margin-top:30px}
.hediye3{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:11px;
  cursor:pointer;padding-top:34px;transition:transform .18s;
}
.hediye3:active{transform:scale(.93)}
.hediye3.zipla{animation:hediyePop .5s ease}
@keyframes hediyePop{30%{transform:scale(1.13) rotate(-2.5deg)}60%{transform:scale(.95)}}
.hediye3 .ad{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.92rem;letter-spacing:.6px;color:var(--murekkep)}
.ucanlar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;gap:9px;pointer-events:none}
.ucanlar span{font-size:1.15rem;animation:sallanUc 2.4s ease-in-out infinite}
.ucanlar span:nth-child(2){animation-delay:.5s}
.ucanlar span:nth-child(3){animation-delay:1.1s}
@keyframes sallanUc{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(5deg)}}
