<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğum günün kutlu olsun bitanem ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Caveat:wght@500;700&family=Patrick+Hand&family=Pinyon+Script&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cimen-koyu:#0e2213;
  --cimen:#1e3d24;
  --cimen-acik:#2f5233;
  --kirmizi:#a63a2e;
  --kirmizi-koyu:#7e2a20;
  --bordo:#5e1d16;
  --krem:#faf3e3;
  --kagit:#fffdf6;
  --gunes:#e9b64c;
  --murekkep:#3f3428;
  --mantar:#c89b66;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Quicksand',sans-serif;color:var(--krem);
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen) 40%,var(--cimen-acik) 120%);
  overflow-x:hidden;
}
body.kilitli{overflow:hidden;height:100svh}
/* çimen dokusu */
.cimenli{position:relative}
.cimenli::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.15;
  background:repeating-linear-gradient(88deg, transparent 0 7px, rgba(15,45,20,.9) 7px 8px),
             repeating-linear-gradient(92deg, transparent 0 11px, rgba(90,140,85,.35) 11px 12px);
}
.bolum{
  position:relative;min-height:100svh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 20px;gap:22px;text-align:center;
}
.el{font-family:'Caveat',cursive;font-weight:700}
.zarif{font-family:'Pinyon Script',cursive;font-weight:400}
.altbaslik{font-family:'Caveat',cursive;font-size:clamp(1.4rem,5vw,2rem);color:var(--gunes)}
p{font-size:clamp(.95rem,3.6vw,1.08rem);max-width:560px;line-height:1.75;opacity:.93}
.ipucu{font-size:.78rem;opacity:.55;letter-spacing:1.2px;text-transform:uppercase}
.ok{font-size:1.5rem;opacity:.6;animation:zipla 1.8s ease-in-out infinite}
@keyframes zipla{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}

/* kaydırınca belirme sistemi */
.belir{opacity:0;transform:translateY(36px);transition:opacity .9s ease, transform .9s cubic-bezier(.22,.9,.3,1)}
.belir.g{opacity:1;transform:translateY(0)}
.belir.soldan{transform:translateX(-46px)}
.belir.sagdan{transform:translateX(46px)}
.belir.soldan.g,.belir.sagdan.g{transform:translateX(0)}
.b1{transition-delay:.08s}.b2{transition-delay:.2s}.b3{transition-delay:.34s}.b4{transition-delay:.48s}.b5{transition-delay:.62s}.b6{transition-delay:.76s}

/* pötikare */
.potikare{
  background:
    repeating-linear-gradient(0deg, rgba(166,58,46,.5) 0 16px, transparent 16px 32px),
    repeating-linear-gradient(90deg, rgba(166,58,46,.5) 0 16px, transparent 16px 32px),
    var(--krem);
}
.dikisli{position:relative}
.dikisli::after{content:"";position:absolute;inset:7px;border:2px dashed rgba(126,42,32,.5);border-radius:inherit;pointer-events:none}

/* ============ KİLİT EKRANI (sabit katman) ============ */
#kilitKatman{
  position:fixed;inset:0;z-index:100;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .9s ease, visibility .9s, transform .9s ease;
  padding:24px;text-align:center;
}
#kilitKatman .fon{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-image:
    radial-gradient(ellipse at 50% -20%, rgba(233,182,76,.10), transparent 55%),
    linear-gradient(180deg, var(--cimen-koyu), var(--cimen));
}
#kilitKatman .perde{position:absolute;inset:0;background:rgba(8,20,11,.55);backdrop-filter:blur(5px)}
#kilitKatman > *:not(.fon):not(.perde){position:relative;z-index:2}
#kilitKatman.acildi{opacity:0;visibility:hidden;transform:scale(1.14)}
.kilit-baslik{font-family:'Pinyon Script',cursive;font-size:clamp(2.2rem,9vw,3.4rem);text-shadow:0 2px 14px rgba(0,0,0,.55)}

/* kalp asma kilit */
.asma-kilit{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 22px 40px rgba(0,0,0,.55))}
.kanca{
  width:104px;height:88px;margin-bottom:-40px;
  border:15px solid #93ac8d;border-bottom:none;border-radius:60px 60px 0 0;
  box-shadow:inset 0 3px 4px rgba(255,255,255,.45), inset 0 -4px 6px rgba(20,40,25,.55);
  transform-origin:14px 100%;
  transition:transform .55s cubic-bezier(.3,1.5,.5,1);
}
.asma-kilit.acik .kanca{transform:translateY(-34px) rotate(-16deg)}
.kilit-govde{
  position:relative;width:min(230px,62vw);aspect-ratio:1;
  clip-path:url(#kalpKlip);
  background:linear-gradient(150deg,#55895e,#2f5a3b 52%,#1c3a26);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:6%;gap:12px;
}
.kilit-govde::before{
  content:"";position:absolute;left:14%;top:8%;width:34%;height:26%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(255,255,255,.28), transparent 70%);
  pointer-events:none;
}
.haneler{display:flex;gap:9px}
.hane{
  width:32px;height:42px;border-radius:8px;
  background:rgba(250,243,227,.13);border:1.5px solid rgba(250,243,227,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;font-weight:600;color:var(--krem);
  transition:all .18s;
}
.hane.dolu{background:var(--gunes);border-color:var(--gunes);color:var(--cimen-koyu);box-shadow:0 0 14px rgba(233,182,76,.65)}
.delikk{width:15px;height:15px;border-radius:50%;background:rgba(8,22,12,.8);position:relative}
.delikk::after{content:"";position:absolute;left:50%;top:11px;transform:translateX(-50%);width:10px;height:13px;background:rgba(8,22,12,.8);clip-path:polygon(32% 0,68% 0,100% 100%,0 100%)}
.asma-kilit.hata{animation:salla .45s ease}
.tus-takimi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tus{
  width:62px;height:62px;border-radius:50%;cursor:pointer;color:var(--krem);
  font-size:1.4rem;font-weight:500;font-family:'Quicksand',sans-serif;
  background:rgba(250,243,227,.12);border:1px solid rgba(250,243,227,.3);
  backdrop-filter:blur(4px);
  transition:background .15s, transform .1s;
}
.tus:active{background:rgba(233,182,76,.3);transform:scale(.92)}
.tus.yardimci{font-size:1rem;background:transparent;border-color:transparent}
@keyframes salla{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-11px)}40%,80%{transform:translateX(11px)}}
#sifreMesaj{font-size:.85rem;min-height:1.2em;color:var(--gunes);text-shadow:0 1px 6px rgba(0,0,0,.6)}

/* dikişli kırmızı buton */
.buton{
  font-family:'Quicksand',sans-serif;font-weight:600;font-size:1rem;
  padding:14px 32px;border-radius:10px;cursor:pointer;color:var(--krem);
  background:linear-gradient(165deg,#b5473a,var(--kirmizi) 60%,var(--kirmizi-koyu));
  border:none;outline:2px dashed rgba(250,243,227,.75);outline-offset:-6px;
  box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .18s ease;
}
.buton:active{transform:scale(.95)}

/* ============ 0. AÇILIŞ: TAM SAYFA FOTOĞRAF ============ */
#acilis{padding:24px}
.acilis-fon{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-image:linear-gradient(180deg, var(--cimen-koyu), var(--cimen) 70%);
  animation:yavasZoom 9s ease-out forwards;
}
@keyframes yavasZoom{from{transform:scale(1.07)}to{transform:scale(1)}}
.acilis-perde{position:absolute;inset:0;background:linear-gradient(180deg, rgba(8,20,11,.30) 0%, rgba(8,20,11,.42) 55%, rgba(8,20,11,.72) 100%)}
#acilis > *:not(.acilis-fon):not(.acilis-perde){position:relative;z-index:2}
.acilis-baslik{
  font-family:'Pinyon Script',cursive;font-weight:400;
  font-size:clamp(2.7rem,12vw,5.4rem);line-height:1.15;max-width:14ch;
  text-shadow:0 3px 22px rgba(0,0,0,.75), 0 1px 4px rgba(0,0,0,.6);
}
.acilis-alt{font-family:'Caveat',cursive;font-size:clamp(1.3rem,5vw,1.9rem);color:var(--gunes);text-shadow:0 2px 10px rgba(0,0,0,.7)}
#acilis .ok{position:absolute;bottom:26px;left:50%;transform:translateX(-50%)}

/* ============ 1. BÖLÜM: PİKNİK SERME ============ */
.kavis{width:min(560px,94vw);margin-bottom:-26px}
.kavis text{font-family:'Alfa Slab One',serif;font-size:42px;fill:var(--krem);letter-spacing:1px}
.kavis .golge{fill:rgba(0,0,0,.35);transform:translate(2px,3px)}
.serme{
  position:relative;width:min(620px,94vw);border-radius:10px;
  padding:clamp(22px,5vw,40px);
  transform:rotate(-1.2deg);
  box-shadow:0 30px 70px rgba(0,0,0,.55);
}
.serme-ic{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(10px,3vw,24px)}
.sepet-buyuk{font-size:clamp(4.4rem,17vw,7rem);filter:drop-shadow(0 12px 20px rgba(0,0,0,.35));transform:rotate(-3deg)}
.meyve{position:absolute;font-size:1.5rem;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.cicek-sol{position:absolute;left:-8px;top:-14px;font-size:2.2rem;transform:rotate(-20deg)}
.cicek-sag{position:absolute;right:-6px;bottom:-12px;font-size:2rem;transform:rotate(15deg)}

/* kaset */
.kaset{
  position:relative;width:150px;height:94px;border-radius:8px;transform:rotate(4deg);
  background:linear-gradient(170deg,#2b2b2b,#151515);
  box-shadow:0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink:0;
}
.kaset .etiket{
  position:absolute;left:10px;right:10px;top:9px;height:46px;border-radius:4px;
  background:linear-gradient(180deg,var(--krem),#efe4c8);
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:1.05rem;color:var(--kirmizi);font-weight:700;
}
.kaset .etiket::before{content:"";position:absolute;top:5px;left:8px;right:8px;height:3px;background:repeating-linear-gradient(90deg,var(--kirmizi) 0 8px,transparent 8px 14px);opacity:.5}
.kaset .makara{position:absolute;bottom:12px;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#0a0a0a 34%,#3a3a3a 36% 60%,#0a0a0a 62%);border:2px solid #444}
.kaset .makara.m1{left:26px}.kaset .makara.m2{right:26px}
.kaset .vida{position:absolute;width:5px;height:5px;border-radius:50%;background:#555}
.kaset .vida:nth-of-type(4){left:5px;top:5px}.kaset .vida:nth-of-type(5){right:5px;top:5px}
.kaset .vida:nth-of-type(6){left:5px;bottom:5px}.kaset .vida:nth-of-type(7){right:5px;bottom:5px}

/* fotoğraf makinesi */
.makine{
  position:relative;width:132px;height:88px;border-radius:12px;transform:rotate(-5deg);flex-shrink:0;
  background:linear-gradient(180deg,#8a6f52 0 34%, #3b3128 34%);
  box-shadow:0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.2);
}
.makine .objektif{
  position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #7fa3b5 6%, #23404e 40%, #0d1b22 70%);
  border:5px solid #d9cfc0;box-shadow:0 3px 8px rgba(0,0,0,.4);
}
.makine .vizor{position:absolute;left:12px;top:7px;width:22px;height:13px;border-radius:3px;background:#1c1712;border:2px solid #d9cfc0}
.makine .flas{position:absolute;right:14px;top:8px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #fff8e0, #b3a37a)}
.makine .dugme{position:absolute;right:26px;top:-7px;width:18px;height:9px;border-radius:3px;background:#c2402f}

/* mini zarf (sermede duran) */
.mini-zarf{
  position:relative;width:118px;height:80px;transform:rotate(6deg);flex-shrink:0;
  background:linear-gradient(170deg,#b5473a,var(--kirmizi-koyu));border-radius:6px;
  box-shadow:0 10px 24px rgba(0,0,0,.4);
}
.mini-zarf::before{content:"";position:absolute;inset:0;clip-path:polygon(0 0, 50% 52%, 100% 0);background:#c6584a;border-radius:6px 6px 0 0}
.mini-zarf .pul{position:absolute;left:50%;top:34px;transform:translateX(-50%);font-size:1.15rem}

/* ============ 2. BÖLÜM: ŞARKI ============ */
#sarki{background:linear-gradient(180deg, rgba(10,22,12,.55), rgba(10,22,12,.75)), var(--cimen-koyu)}
.sarki-duzen{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(24px,5vw,54px);width:min(860px,94vw)}
.plak-kutu{position:relative}
.plak{
  width:min(240px,62vw);aspect-ratio:1;border-radius:50%;position:relative;cursor:pointer;
  background:repeating-radial-gradient(circle, #171411 0 2.4px, #262119 2.4px 4.4px);
  box-shadow:0 22px 48px rgba(0,0,0,.65), inset 0 0 26px rgba(0,0,0,.85);
  animation:don 5s linear infinite;animation-play-state:paused;
}
.plak.donuyor{animation-play-state:running}
@keyframes don{to{transform:rotate(360deg)}}
.plak .orta{
  position:absolute;inset:30%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #c6584a, var(--kirmizi) 60%, var(--kirmizi-koyu));
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:1rem;color:var(--krem);line-height:1.15;padding:10px;
}
.plak .delik{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--cimen-koyu)}
.plak-alt{margin-top:14px;font-family:'Caveat',cursive;font-size:1.3rem;color:var(--gunes)}
.calar{
  width:min(420px,90vw);border-radius:12px;overflow:hidden;
  background:#101010;border:6px solid var(--krem);
  box-shadow:0 22px 50px rgba(0,0,0,.6);
  transform:rotate(1.2deg);
}
.calar .ust-serit{display:flex;align-items:center;gap:8px;background:var(--krem);padding:8px 12px;color:var(--murekkep);font-family:'Caveat',cursive;font-size:1.15rem;text-align:left}
.calar .ust-serit .yuvarlak{width:10px;height:10px;border-radius:50%}
.calar iframe{display:block;width:100%;aspect-ratio:16/9;border:0}
.calar .sahte{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:radial-gradient(circle at 50% 40%, #232323, #0c0c0c)}
.calar .sahte .oynat{width:64px;height:64px;border-radius:50%;background:var(--kirmizi);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--krem);box-shadow:0 8px 20px rgba(0,0,0,.5)}
.calar .sahte .ad{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--krem)}
.calar .sahte .sanatci{font-size:.85rem;opacity:.65}

/* ============ 3. BÖLÜM: KALP MADALYON + NEDENLER ============ */
#madalyon .zemin{
  position:relative;width:min(720px,94vw);border-radius:10px;
  padding:clamp(26px,6vw,52px) clamp(14px,4vw,40px);
  transform:rotate(.8deg);box-shadow:0 30px 70px rgba(0,0,0,.55);
}
.kalpler{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap}
.kalp-cerceve{position:relative;width:clamp(140px,38vw,190px);aspect-ratio:1;filter:drop-shadow(0 12px 22px rgba(0,0,0,.4))}
.kalp-cerceve .altin{position:absolute;inset:0;clip-path:url(#kalpKlip);background:linear-gradient(140deg,#f0d48a,#c99b3f 55%,#a4762a)}
.kalp-cerceve .ic{position:absolute;inset:7%;clip-path:url(#kalpKlip);background:var(--cimen);overflow:hidden;display:flex;align-items:center;justify-content:center}
.kalp-cerceve .ic img{width:100%;height:100%;object-fit:cover}
.kalp-cerceve .yertutucu{font-family:'Caveat',cursive;font-size:1.05rem;color:#cfe3c4;padding:20%}
.zincir{font-size:1.3rem;letter-spacing:-2px;color:#c99b3f;text-shadow:0 2px 4px rgba(0,0,0,.35)}
.madalyon-cicek{position:absolute;font-size:1.9rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.notlar{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:26px}
.not{
  position:relative;width:clamp(140px,42vw,168px);min-height:104px;padding:20px 13px 13px;
  background:linear-gradient(170deg,#b5473a,var(--kirmizi));color:var(--krem);
  font-family:'Caveat',cursive;font-size:1.18rem;line-height:1.25;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 22px rgba(0,0,0,.4);
}
.not::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-2deg);width:58px;height:18px;background:rgba(250,243,227,.55);box-shadow:inset 0 0 5px rgba(0,0,0,.12)}
.not:nth-child(odd){transform:rotate(-2.4deg)}
.not:nth-child(even){transform:rotate(2deg)}

/* ============ 4. BÖLÜM: ZARF ============ */
.zarf-ortu{position:relative;width:min(430px,92vw);padding:46px 22px 46px;border-radius:8px;transform:rotate(-1deg);box-shadow:0 28px 64px rgba(0,0,0,.55);display:flex;justify-content:center}
.zarf{position:relative;width:230px;height:154px;cursor:pointer;transform:rotate(1.5deg);transition:transform .3s}
.zarf:active{transform:rotate(1.5deg) scale(.97)}
.zarf .arka{position:absolute;inset:0;background:linear-gradient(170deg,#b5473a,var(--kirmizi-koyu));border-radius:8px;box-shadow:0 14px 30px rgba(0,0,0,.45)}
.zarf .mektupcuk{
  position:absolute;left:11px;right:11px;top:9px;height:132px;background:var(--kagit);border-radius:4px;
  display:flex;align-items:center;justify-content:center;z-index:1;
  font-family:'Caveat',cursive;font-size:1.3rem;color:var(--kirmizi);
  transition:transform .95s ease .55s;padding:10px;line-height:1.3;
}
.zarf .on{position:absolute;left:0;right:0;bottom:0;height:84px;z-index:2;background:linear-gradient(180deg,#c6584a,var(--kirmizi));border-radius:0 0 8px 8px;clip-path:polygon(0 0, 50% 46%, 100% 0, 100% 100%, 0 100%)}
.zarf .kapak{
  position:absolute;top:0;left:0;width:0;height:0;z-index:3;
  border-left:115px solid transparent;border-right:115px solid transparent;
  border-top:82px solid #d3695b;
  transform-origin:top;transition:transform .7s ease;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
}
.zarf .muhur{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:4;
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #f0c96a, var(--gunes) 55%, #b07f24);
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 3px 10px rgba(0,0,0,.4);transition:opacity .4s, transform .4s;
}
.zarf.acik .kapak{transform:rotateX(180deg);z-index:1}
.zarf.acik .muhur{opacity:0;transform:translateX(-50%) scale(1.6)}
.zarf.acik .mektupcuk{transform:translateY(-84px)}
.papatya{position:absolute;font-size:1.7rem;filter:drop-shadow(0 4px 7px rgba(0,0,0,.3))}

/* ============ 5. BÖLÜM: MEKTUP ============ */
#mektup{background:linear-gradient(180deg,var(--bordo),#4a150f)}
#mektup::before{content:"";position:absolute;inset:0;opacity:.25;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(166,58,46,.55) 0 18px, transparent 18px 36px),
             repeating-linear-gradient(90deg, rgba(166,58,46,.55) 0 18px, transparent 18px 36px)}
.mektup-kagit{
  position:relative;width:min(560px,92vw);
  background:linear-gradient(165deg,#fffef9,var(--kagit));
  color:var(--murekkep);border-radius:4px;padding:36px 30px 30px;text-align:left;
  font-family:'Caveat',cursive;font-size:1.42rem;line-height:1.55;
  box-shadow:0 26px 60px rgba(0,0,0,.6);transform:rotate(-1deg);
}
.mektup-kagit h3{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.9rem,7vw,2.6rem);color:var(--kirmizi);text-align:center;margin-bottom:16px}
.mektup-kagit .imza{text-align:right;margin-top:16px;font-size:1.55rem;color:var(--kirmizi)}
.mektup-kagit .kose{position:absolute;font-size:1.6rem}
.mektup-kagit .opucuk{position:absolute;right:22px;bottom:-16px;font-size:2rem;transform:rotate(-14deg)}

/* ============ 6. BÖLÜM: POLAROİDLER ============ */
#anilar{background:linear-gradient(180deg,#4a150f,var(--bordo))}
.polaroidler{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(14px,3.5vw,30px);max-width:1000px}
.kart{
  width:clamp(160px,42vw,210px);background:var(--kagit);border-radius:3px;
  padding:11px 11px 0;box-shadow:0 16px 38px rgba(0,0,0,.5);
  display:flex;flex-direction:column;position:relative;
}
.kart:nth-child(odd){transform:rotate(-2.6deg)}
.kart:nth-child(even){transform:rotate(2.2deg)}
.kart .foto{aspect-ratio:1;background:var(--cimen);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.kart .foto img{width:100%;height:100%;object-fit:cover}
.kart .yertutucu{font-family:'Caveat',cursive;font-size:1.15rem;color:#cfe3c4;padding:12px}
.kart .altyazi{font-family:'Caveat',cursive;font-size:1.22rem;color:var(--murekkep);padding:9px 4px 12px;text-align:center}
.kart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:82px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}

/* ============ 7. BÖLÜM: MANTAR PANO ============ */
.pano{
  position:relative;width:min(620px,94vw);border-radius:14px;
  padding:clamp(26px,6vw,46px) clamp(18px,5vw,40px);
  background:
    radial-gradient(circle at 22% 28%, rgba(90,60,30,.28) 0 2px, transparent 3px),
    radial-gradient(circle at 68% 62%, rgba(90,60,30,.25) 0 2px, transparent 3px),
    radial-gradient(circle at 44% 80%, rgba(90,60,30,.22) 0 2px, transparent 3px),
    linear-gradient(165deg,#d3a873,var(--mantar));
  background-size:52px 52px, 64px 64px, 58px 58px, 100% 100%;
  border:12px solid #7a5230;
  box-shadow:0 30px 70px rgba(0,0,0,.55), inset 0 0 40px rgba(80,50,20,.35);
  transform:rotate(-.6deg);
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.pano-not{
  position:relative;background:var(--kagit);color:var(--murekkep);
  font-family:'Caveat',cursive;font-size:clamp(1.25rem,4.6vw,1.5rem);line-height:1.45;
  padding:24px 20px 18px;max-width:440px;box-shadow:0 10px 24px rgba(0,0,0,.35);
  transform:rotate(1.4deg);
}
.pano-not::before{content:"📌";position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:1.5rem;filter:drop-shadow(0 3px 4px rgba(0,0,0,.3))}
.pano .yildiz{position:absolute;color:var(--kirmizi);font-size:1.1rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.cep{
  position:relative;width:150px;height:118px;border-radius:8px 8px 16px 16px;transform:rotate(-2.5deg);
  background:linear-gradient(170deg,#3f5c7a,#2c415a);
  box-shadow:0 10px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
.cep::before{content:"";position:absolute;inset:8px;border:2px dashed rgba(233,196,120,.75);border-radius:6px 6px 12px 12px}
.cep .kucuk-not{
  position:absolute;left:50%;top:-24px;transform:translateX(-50%) rotate(3deg);
  background:var(--kagit);color:var(--kirmizi);font-family:'Caveat',cursive;font-size:1rem;
  padding:7px 12px;box-shadow:0 6px 14px rgba(0,0,0,.3);white-space:nowrap;
}
#finalBaslik{font-family:'Pinyon Script',cursive;font-size:clamp(2.8rem,12vw,4.6rem);background:linear-gradient(90deg,var(--krem),var(--gunes),var(--krem));background-size:200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:parla 4.5s linear infinite}
@keyframes parla{to{background-position:200%}}

/* ============ ZAMAN TÜNELİ (tam ekran galeri) ============ */
body.tunelde{overflow:hidden;height:100svh}
.tunel{
  position:fixed;inset:0;z-index:120;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen));
}
.tunel.acik{display:flex}
.tunel-ust{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;flex-shrink:0;
  background:rgba(10,24,14,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(250,243,227,.15);
}
.tunel-ust h2{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.7rem,6.5vw,2.4rem);color:var(--krem)}
.kapat{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;cursor:pointer;
  border:1px solid rgba(250,243,227,.35);background:rgba(250,243,227,.09);
  color:var(--krem);font-size:1.15rem;line-height:1;
  transition:background .15s, transform .1s;
}
.kapat:active{background:rgba(166,58,46,.5);transform:scale(.92)}
.tunel-icerik{
  overflow-y:auto;flex:1;width:100%;
  padding:28px clamp(14px,4vw,32px) 70px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,86vw),1fr));
  gap:30px 24px;align-items:start;
  max-width:1100px;margin:0 auto;
}
.anikart{
  position:relative;background:var(--kagit);border-radius:4px;
  padding:12px 12px 14px;color:var(--murekkep);
  box-shadow:0 14px 32px rgba(0,0,0,.45);
}
.anikart:nth-child(odd){transform:rotate(-1.1deg)}
.anikart:nth-child(even){transform:rotate(1deg)}
.anikart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:84px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.anikart img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;background:var(--cimen);display:block}
.anikart .bos{aspect-ratio:4/3;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.3rem;color:#cfe3c4;padding:16px;text-align:center}
.anikart .tarih{font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.04rem;letter-spacing:.3px;color:var(--kirmizi-koyu);margin:13px 2px 3px}
.anikart .aciklama{font-family:'Caveat',cursive;font-size:1.28rem;line-height:1.35;color:var(--murekkep);padding:0 2px}

/* ============ 8. BÖLÜM: HEDİYELER (dantel kart) ============ */
#hediyeler{background:linear-gradient(180deg,#3f120d,var(--bordo) 60%,#4a150f)}
.dantel{
  position:relative;width:min(660px,94vw);
  background:linear-gradient(160deg,#fcf7e9,var(--krem));
  border:11px dotted #47130e;border-radius:26px;
  padding:clamp(28px,6vw,48px) clamp(16px,4vw,40px);
  box-shadow:0 28px 64px rgba(0,0,0,.55);
  transform:rotate(-.5deg);
}
.dantel::after{content:"";position:absolute;inset:13px;border:1.5px dashed rgba(126,42,32,.5);border-radius:12px;pointer-events:none}
.dantel-ust{font-family:'Pinyon Script',cursive;font-size:clamp(1.7rem,6.5vw,2.3rem);color:var(--kirmizi)}
.dantel-alt{font-family:'Pinyon Script',cursive;font-size:clamp(2rem,8vw,3rem);color:var(--kirmizi);margin-top:14px}
.hediye-sira{display:flex;justify-content:center;align-items:flex-end;gap:clamp(16px,5vw,46px);flex-wrap:wrap;margin-top:30px}
.hediye3{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:11px;
  cursor:pointer;padding-top:34px;transition:transform .18s;
}
.hediye3:active{transform:scale(.93)}
.hediye3.zipla{animation:hediyePop .5s ease}
@keyframes hediyePop{30%{transform:scale(1.13) rotate(-2.5deg)}60%{transform:scale(.95)}}
.hediye3 .ad{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.92rem;letter-spacing:.6px;color:var(--murekkep)}
.ucanlar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;gap:9px;pointer-events:none}
.ucanlar span{font-size:1.15rem;animation:sallanUc 2.4s ease-in-out infinite}
.ucanlar span:nth-child(2){animation-delay:.5s}
.ucanlar span:nth-child(3){animation-delay:1.1s}
@keyframes sallanUc{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(5deg)}}

/* mini pasta */
.mini-pasta{position:relative;width:96px;height:86px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.28))}
.mp-kat{position:absolute;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#fffdf4,#f3ead2);border-radius:6px}
.mp-kat.k1{bottom:8px;width:96px;height:26px}
.mp-kat.k2{bottom:32px;width:80px;height:22px}
.mp-kat.k3{bottom:52px;width:62px;height:18px}
.mp-recel{position:absolute;left:50%;transform:translateX(-50%);height:5px;border-radius:3px;background:linear-gradient(90deg,#b8503f,#d96a57)}
.mp-recel.r1{bottom:31px;width:88px}
.mp-recel.r2{bottom:51px;width:72px}
.mp-cilekler{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:.95rem;letter-spacing:2px}
.mp-tabak{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:110px;height:9px;border-radius:50px;background:linear-gradient(180deg,#efe6d0,#cdc0a2)}

/* hediye kutuları */
.kutu3{position:relative;width:94px;height:88px;filter:drop-shadow(0 8px 14px rgba(0,0,0,.28))}
.kutu3 .gvd{position:absolute;bottom:0;left:0;right:0;height:62px;border-radius:7px;overflow:hidden}
.kutu3 .kpk{position:absolute;bottom:54px;left:-7px;width:108px;height:21px;border-radius:5px;overflow:hidden;box-shadow:0 2px 4px rgba(0,0,0,.18)}
.kutu3 .serit{position:absolute;left:50%;transform:translateX(-50%);width:15px;top:0;bottom:0}
.kutu3 .fiyonk{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:44px;height:22px}
.kutu3 .fiyonk::before,.kutu3 .fiyonk::after{content:"";position:absolute;top:2px;width:19px;height:17px}
.kutu3 .fiyonk::before{left:0;border-radius:60% 0 60% 40%;transform:rotate(-16deg)}
.kutu3 .fiyonk::after{right:0;border-radius:0 60% 40% 60%;transform:rotate(16deg)}
.kutu3 .dugum{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;z-index:1}
/* mavi kutu */
.kutu-mavi .gvd{background:repeating-linear-gradient(90deg,#f2f6fb 0 12px,#9db8d6 12px 24px)}
.kutu-mavi .kpk{background:repeating-linear-gradient(90deg,#e3ecf6 0 12px,#7fa0c4 12px 24px)}
.kutu-mavi .serit{background:linear-gradient(90deg,#4a6f9b,#6f93bd 50%,#4a6f9b)}
.kutu-mavi .fiyonk::before,.kutu-mavi .fiyonk::after{background:linear-gradient(150deg,#7fa0c4,#4a6f9b)}
.kutu-mavi .dugum{background:#3c5c84}
.kutu-mavi ~ .ucanlar span, .hediye3 .nota-renk{color:#4a6f9b}
/* kırmızı kutu */
.kutu-kirmizi .gvd{background:repeating-linear-gradient(90deg,#fbf2ef 0 12px,#d98d7f 12px 24px)}
.kutu-kirmizi .kpk{background:repeating-linear-gradient(90deg,#f6e6e2 0 12px,#c86a5c 12px 24px)}
.kutu-kirmizi .serit{background:linear-gradient(90deg,var(--kirmizi-koyu),#c15b4b 50%,var(--kirmizi-koyu))}
.kutu-kirmizi .fiyonk::before,.kutu-kirmizi .fiyonk::after{background:linear-gradient(150deg,#c86a5c,var(--kirmizi-koyu))}
.kutu-kirmizi .dugum{background:#6e2318}

/* ============ ÇİÇEK DUVARI (video tarzı) ============ */
.lale-katman{position:fixed;inset:0;pointer-events:none;z-index:125;overflow:hidden}
.cicek{
  position:absolute;left:var(--x);top:var(--y);width:var(--w);aspect-ratio:1;
  transform:translate(-50%,-50%) scale(0) rotate(var(--r0));
  opacity:0;will-change:transform,opacity;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.22));
  animation:cicekAc var(--sure) var(--gecikme) cubic-bezier(.24,.9,.32,1.15) forwards;
}
.cicek svg,.cicek img{width:100%;height:100%;display:block;object-fit:contain}
.cicek-video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .65s ease;
}
.cicek-video.gorunur{opacity:1}
@keyframes cicekAc{
  0%   {transform:translate(-50%,-50%) scale(0) rotate(var(--r0));opacity:0}
  8%   {opacity:1}
  24%  {transform:translate(-50%,-50%) scale(1.07) rotate(var(--r1))}
  32%  {transform:translate(-50%,-50%) scale(1) rotate(var(--r1))}
  60%  {transform:translate(-50%,-50%) scale(1) rotate(var(--r1));opacity:1}
  76%  {transform:translate(-50%,-50%) scale(1.07) rotate(var(--r1))}
  92%  {opacity:1}
  100% {transform:translate(-50%,-50%) scale(0) rotate(var(--r0));opacity:0}
}
/* buket modu: hediye kartı süsündeki mini laleler .kart-laleleri kuralında */
@media (prefers-reduced-motion: reduce){.cicek{animation-duration:.01s}}

/* ============ HEDİYE SAYFASI (yazı modalı) ============ */
.hediye-sayfa{
  position:fixed;inset:0;z-index:118;display:none;
  align-items:center;justify-content:center;padding:22px;
  background:rgba(7,15,9,.62);backdrop-filter:blur(6px);
}
.hediye-sayfa.acik{display:flex}
.hediye-kart{
  position:relative;width:min(520px,94vw);max-height:80svh;overflow-y:auto;
  background:
    repeating-linear-gradient(transparent 0 33px, rgba(74,66,52,.16) 33px 34px),
    linear-gradient(160deg,#fdf8ea,var(--krem));
  color:var(--murekkep);border-radius:6px;
  padding:40px 26px 26px;text-align:left;
  font-family:'Caveat',cursive;font-size:1.42rem;line-height:34px;
  box-shadow:0 26px 60px rgba(0,0,0,.6);
  transform:rotate(-1deg);
}
.hediye-kart::before{
  content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%) rotate(-2deg);
  width:112px;height:28px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.12);
}
.hediye-kart h3{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.9rem,7vw,2.5rem);color:var(--kirmizi);text-align:center;margin-bottom:12px;line-height:1.2}
.hediye-kart .kapat{position:sticky;top:0;float:right;margin:-30px -8px 0 0;background:var(--kirmizi);border:none;color:var(--krem);width:38px;height:38px;font-size:1.05rem}
.kart-laleleri{display:flex;justify-content:center;gap:4px;margin-top:16px}
.kart-laleleri svg{width:30px;height:66px}

/* ============ MİNİ ŞİFRE (anılar kilidi) ============ */
.mini-sifre{
  position:fixed;inset:0;z-index:140;display:none;
  align-items:center;justify-content:center;padding:22px;
  background:rgba(7,15,9,.66);backdrop-filter:blur(6px);
}
.mini-sifre.acik{display:flex}
.msifre-kart{
  width:min(320px,90vw);border-radius:22px;padding:24px 20px 20px;
  background:linear-gradient(180deg, rgba(250,243,227,.12), rgba(250,243,227,.06));
  border:1px solid rgba(250,243,227,.25);backdrop-filter:blur(10px);
  box-shadow:0 26px 64px rgba(0,0,0,.6);
  display:flex;flex-direction:column;align-items:center;gap:15px;text-align:center;
}
.msifre-kart.hata{animation:salla .45s ease}
.msifre-baslik{font-family:'Pinyon Script',cursive;font-size:clamp(1.7rem,7vw,2.2rem);color:var(--krem)}
.msifre-kart .haneler .hane{width:30px;height:40px;font-size:1.25rem}
.msifre-kart .tus{width:56px;height:56px;font-size:1.3rem}
.msifre-kart .tus-takimi{gap:11px}
#msifreMesaj{font-size:.85rem;min-height:1.1em;color:var(--gunes)}
.msifre-vazgec{background:none;border:none;color:rgba(250,243,227,.65);font-size:.85rem;cursor:pointer;text-decoration:underline;font-family:'Quicksand',sans-serif}

/* ============ 2 YAŞ GALERİSİ + VİDEOLAR ============ */
.izgara-icerik{
  overflow-y:auto;flex:1;width:100%;
  padding:28px clamp(14px,4vw,32px) 70px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,86vw),1fr));
  gap:26px 22px;align-items:start;max-width:1100px;margin:0 auto;
}
.sira-no{
  position:absolute;top:-13px;left:-11px;z-index:1;
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(160deg,#7fa377,var(--cimen-acik));
  color:var(--krem);font-family:'Quicksand',sans-serif;font-weight:600;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.35);
}
.video-kart{
  position:relative;background:var(--kagit);border-radius:4px;
  padding:12px 12px 14px;color:var(--murekkep);
  box-shadow:0 14px 32px rgba(0,0,0,.45);
}
.video-kart:nth-child(odd){transform:rotate(-.9deg)}
.video-kart:nth-child(even){transform:rotate(.8deg)}
.video-kart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:84px;height:22px;background:rgba(166,58,46,.4);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.video-kart video{width:100%;aspect-ratio:16/9;border-radius:2px;background:#000;display:block}
.video-kart .bos{aspect-ratio:16/9;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.3rem;color:#cfe3c4;padding:16px;text-align:center}
.video-kart .yazi{font-family:'Caveat',cursive;font-size:1.3rem;line-height:1.35;color:var(--murekkep);padding:11px 2px 0}

/* ============ MİNİ KİLİT (Zaman Tüneli şifresi) ============ */
.mini-kilit-sayfa{
  position:fixed;inset:0;z-index:130;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:rgba(7,15,9,.72);backdrop-filter:blur(7px);padding:22px;text-align:center;
}
.mini-kilit-sayfa.acik{display:flex}
.mini-kilit-sayfa .asma-kilit{transform:scale(.82)}
.mini-kilit-sayfa .kapat{position:absolute;top:18px;right:18px}
.mini-baslik{font-family:'Pinyon Script',cursive;font-size:clamp(1.8rem,7vw,2.5rem);text-shadow:0 2px 12px rgba(0,0,0,.6)}

/* ============ "2 YAŞ BÜYÜK" BÖLÜMÜ ============ */
.yas-baslik{
  font-family:'Alfa Slab One',serif;font-size:clamp(1.35rem,5.6vw,2.5rem);line-height:1.3;
  letter-spacing:2px;color:var(--krem);text-shadow:0 3px 0 rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.45);
  max-width:16ch;
}
.yas-galeri{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(150px,42vw),1fr));
  gap:16px 14px;width:min(920px,94vw);
}
.yas-kart{position:relative;background:var(--kagit);border-radius:3px;padding:8px 8px 9px;box-shadow:0 10px 24px rgba(0,0,0,.42)}
.yas-kart:nth-child(odd){transform:rotate(-1.2deg)}
.yas-kart:nth-child(even){transform:rotate(1deg)}
.yas-kart img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:2px;background:var(--cimen);display:block}
.yas-kart .bos{aspect-ratio:1;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.1rem;color:#cfe3c4;padding:8px;text-align:center}
.yas-kart .no{
  position:absolute;top:-9px;left:-8px;width:27px;height:27px;border-radius:50%;
  background:var(--kirmizi);color:var(--krem);font-weight:600;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 7px rgba(0,0,0,.35);
}
.yas-kart .yazi{font-family:'Caveat',cursive;font-size:1.12rem;color:var(--murekkep);padding-top:6px;min-height:0}

/* ============ VİDEOLARIMIZ ============ */
#videolar{background:linear-gradient(180deg,var(--cimen),#12301a)}
.video-galeri{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,88vw),1fr));
  gap:24px;width:min(980px,94vw);
}
.video-kart{position:relative;background:var(--kagit);border-radius:4px;padding:10px 10px 12px;box-shadow:0 14px 32px rgba(0,0,0,.45);color:var(--murekkep)}
.video-kart:nth-child(odd){transform:rotate(-.8deg)}
.video-kart:nth-child(even){transform:rotate(.7deg)}
.video-kart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:84px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.video-kart video{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px;background:#0d0d0d;display:block}
.video-kart .bos{aspect-ratio:16/9;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.25rem;color:#cfe3c4;padding:12px;text-align:center}
.video-kart .yazi{font-family:'Caveat',cursive;font-size:1.28rem;line-height:1.35;padding:9px 2px 0}

/* ============ ANILAR: FİLM ŞERİDİ (yatay kaydırma) ============ */
.serit-kutu{position:relative;width:100vw;max-width:100%}
.film-serit{
  display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;
  padding:20px 11vw 26px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
}
.film-serit{align-items:center}
.film-serit::-webkit-scrollbar{display:none}
.serit-kart.bolucu{
  flex:0 0 min(58vw,270px);aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.5rem,6vw,2rem);
  color:var(--kirmizi);text-align:center;line-height:1.25;padding:20px;
}
.serit-kart{
  flex:0 0 min(76vw,330px);scroll-snap-align:center;position:relative;
  background:var(--kagit);border-radius:4px;padding:12px 12px 13px;color:var(--murekkep);
  box-shadow:0 16px 36px rgba(0,0,0,.45);
}
.serit-kart:nth-child(odd){transform:rotate(-1deg)}
.serit-kart:nth-child(even){transform:rotate(.9deg)}
.serit-kart::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:86px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.serit-kart img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:2px;background:var(--cimen);display:block}
.serit-kart .bos{aspect-ratio:3/4;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.3rem;color:#cfe3c4;padding:14px;text-align:center}
.serit-kart .tarih{font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.02rem;letter-spacing:.3px;color:var(--kirmizi-koyu);margin:12px 2px 3px}
.serit-kart .aciklama{font-family:'Caveat',cursive;font-size:1.26rem;line-height:1.32;color:var(--murekkep);padding:0 2px}
.serit-sayac{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:1px;color:var(--gunes)}

/* kilit perdesi */
.serit-perde{
  position:absolute;inset:0;z-index:5;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(10,22,13,.55);backdrop-filter:blur(13px);
  transition:opacity .8s ease, visibility .8s;cursor:pointer;
}
.serit-perde.acildi{opacity:0;visibility:hidden}
.serit-perde .buyuk-kilit{font-size:3rem;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.serit-perde .perde-yazi{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--krem)}

/* ============ ALBÜMLER: kapaklar + tam ekran kaydırmalı sayfa ============ */
.album-kapaklar{display:flex;gap:clamp(16px,4vw,34px);flex-wrap:wrap;justify-content:center}
.album-kapak{
  position:relative;width:min(240px,72vw);cursor:pointer;
  background:var(--kagit);border-radius:4px;padding:12px 12px 14px;color:var(--murekkep);
  box-shadow:0 16px 38px rgba(0,0,0,.45);transition:transform .18s;
}
.album-kapak:active{transform:scale(.95)}
.album-kapak:nth-child(odd){transform:rotate(-1.6deg)}
.album-kapak:nth-child(even){transform:rotate(1.4deg)}
.album-kapak::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:86px;height:22px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.album-kapak .on-yuz{aspect-ratio:1;border-radius:2px;background:linear-gradient(160deg,var(--cimen-acik),var(--cimen));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.album-kapak .on-yuz .simge{font-size:3rem;filter:drop-shadow(0 6px 12px rgba(0,0,0,.35))}
.album-kapak .on-yuz .adet{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:1px;color:var(--krem);opacity:.9}
.album-kapak .kapak-ad{font-family:'Caveat',cursive;font-weight:700;font-size:1.3rem;text-align:center;padding-top:9px;line-height:1.2}

.album-sayfa{
  position:fixed;inset:0;z-index:119;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen));
}
.album-sayfa.acik{display:flex}
.album-ust{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;flex-shrink:0;
  background:rgba(10,24,14,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(250,243,227,.15);
}
.album-ust h2{font-family:'Pinyon Script',cursive;font-weight:400;font-size:clamp(1.5rem,6vw,2.2rem);color:var(--krem);line-height:1.1}
.album-orta{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:0}
.album-orta .film-serit{width:100%}
.serit-kart.video-tip{flex:0 0 min(86vw,430px)}
.serit-kart.video-tip video{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px;background:#0d0d0d;display:block}
.serit-kart.video-tip .bos{aspect-ratio:16/9;font-size:1.25rem}
.serit-kart .no{
  position:absolute;top:-9px;left:-8px;z-index:2;width:27px;height:27px;border-radius:50%;
  background:var(--kirmizi);color:var(--krem);font-weight:600;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 7px rgba(0,0,0,.35);
}

/* ============ ERASMUS HİKAYEMİZ (rota dizilimi) ============ */
.yolculuk{position:relative;width:min(720px,94vw);display:flex;flex-direction:column;gap:clamp(44px,10vw,90px);padding:14px 0}
.yolculuk .yol{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.yolculuk .yol path{
  fill:none;stroke:var(--gunes);stroke-width:3;
  stroke-dasharray:11 9;stroke-linecap:round;opacity:.9;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));
}
.durak{
  position:relative;z-index:1;width:min(64vw,300px);
  background:var(--kagit);border-radius:4px;padding:11px 11px 12px;
  box-shadow:0 14px 32px rgba(0,0,0,.45);color:var(--murekkep);
}
.durak.sol{align-self:flex-start;transform:rotate(-1.6deg)}
.durak.sag{align-self:flex-end;transform:rotate(1.5deg)}
.durak::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);width:78px;height:20px;background:rgba(233,182,76,.6);box-shadow:inset 0 0 6px rgba(0,0,0,.14)}
.durak .pin{position:absolute;top:-15px;right:-9px;font-size:1.45rem;filter:drop-shadow(0 3px 5px rgba(0,0,0,.35));z-index:2}
.durak img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;background:var(--cimen);display:block}
.durak .bos{aspect-ratio:4/3;border-radius:2px;background:var(--cimen);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:1.2rem;color:#cfe3c4;padding:12px;text-align:center}
.durak .d-baslik{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.98rem;letter-spacing:.3px;color:var(--kirmizi-koyu);margin:10px 2px 2px}
.durak .d-yazi{font-family:'Caveat',cursive;font-size:1.22rem;line-height:1.3;padding:0 2px}

/* ============ ERASMUS: UÇAK BİLETİ + TAM EKRAN SAYFA ============ */
.ucak-bileti{
  position:relative;width:min(360px,88vw);cursor:pointer;color:var(--murekkep);
  background:linear-gradient(165deg,#fdf8ea,var(--krem));border-radius:14px;
  box-shadow:0 18px 42px rgba(0,0,0,.5);transition:transform .18s;
  -webkit-mask:radial-gradient(circle 11px at 0 68%, transparent 97%, #000) left/51% 100% no-repeat,
               radial-gradient(circle 11px at 100% 68%, transparent 97%, #000) right/51% 100% no-repeat;
  mask:radial-gradient(circle 11px at 0 68%, transparent 97%, #000) left/51% 100% no-repeat,
       radial-gradient(circle 11px at 100% 68%, transparent 97%, #000) right/51% 100% no-repeat;
}
.ucak-bileti:active{transform:scale(.96)}
.bilet-ust{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 10px;border-bottom:1px solid rgba(126,42,32,.2)}
.bilet-ust .marka{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:2.5px;color:var(--kirmizi-koyu)}
.bilet-orta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 22px}
.bilet-orta .uc{font-family:'Alfa Slab One',serif;font-size:1.5rem;color:var(--murekkep)}
.bilet-orta .cizgi{flex:1;position:relative;border-top:2px dashed rgba(126,42,32,.45)}
.bilet-orta .cizgi .ucus{position:absolute;left:50%;top:-13px;transform:translateX(-50%);font-size:1.2rem;background:var(--krem);padding:0 6px}
.bilet-alt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px 14px;border-top:2px dashed rgba(126,42,32,.35)}
.bilet-alt .cagri{font-family:'Caveat',cursive;font-weight:700;font-size:1.25rem;color:var(--kirmizi)}
.bilet-alt .barkod{width:88px;height:30px;background:repeating-linear-gradient(90deg,#3f3428 0 2px,transparent 2px 5px,#3f3428 5px 6px,transparent 6px 10px)}

.erasmus-sayfa{
  position:fixed;inset:0;z-index:119;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen));
}
.erasmus-sayfa.acik{display:flex}
.erasmus-icerik{overflow-y:auto;flex:1;display:flex;flex-direction:column;align-items:center;padding:30px 14px 80px}

/* ============ SARI ÇİÇEKLİ AĞAÇ + SAYAÇ (son bölüm) ============ */
#geriSayim{
  background:
    radial-gradient(ellipse at 50% 115%, rgba(63,52,40,.14), transparent 55%),
    linear-gradient(180deg,#f7efdc,#efe4c9);
  color:var(--murekkep);
}
.agac-sahne{position:relative;width:min(680px,94vw);display:flex;flex-direction:column;align-items:center;gap:6px}
.agac-not{
  align-self:flex-start;text-align:left;width:min(90%,520px);
  font-family:'Patrick Hand','Caveat',cursive;font-size:clamp(1.3rem,5vw,2rem);line-height:1.5;
  color:#4a3d2e;min-height:5em;
}
.agac-not .imlec{display:inline-block;width:2px;height:1em;background:#8a6b3a;margin-left:2px;vertical-align:-2px;animation:yanip .8s step-end infinite}
.agac-svg{width:min(340px,80vw);height:auto;display:block;overflow:visible}
.govde-grubu{transform-origin:150px 320px;transform:scaleY(.02)}
.yeserdi .govde-grubu{animation:govdeBuyu 1.8s cubic-bezier(.3,.9,.35,1) forwards}
@keyframes govdeBuyu{to{transform:scaleY(1)}}
.cicekcik{transform-box:fill-box;transform-origin:center;transform:scale(0);opacity:0}
.yeserdi .cicekcik{animation:cicekcikAc .55s var(--d) cubic-bezier(.3,1.5,.5,1) forwards}
@keyframes cicekcikAc{to{transform:scale(1);opacity:1}}
.yeserdi .agac-svg{animation:agacSalin 5.5s 3.4s ease-in-out infinite}
@keyframes agacSalin{0%,100%{transform:rotate(0)}50%{transform:rotate(.7deg)}}
.dusen{position:absolute;font-size:.85rem;opacity:0;pointer-events:none}
.yeserdi .dusen{animation:yaprakDus var(--ds) var(--dd) linear infinite}
@keyframes yaprakDus{
  0%{opacity:0;transform:translate(0,0) rotate(0)}
  12%{opacity:.85}
  100%{opacity:0;transform:translate(var(--dx),190px) rotate(220deg)}
}
.sayim-satir{
  font-family:'Quicksand',sans-serif;font-size:clamp(.92rem,3.6vw,1.08rem);
  color:#4a3d2e;border-top:1.5px solid rgba(74,61,46,.35);
  padding-top:12px;margin-top:4px;width:100%;text-align:center;line-height:1.7;
}
.sayim-satir b{font-family:'Alfa Slab One',serif;font-weight:400;font-size:1.15em;color:var(--kirmizi-koyu);letter-spacing:.5px}

/* ============ SARI ZARF + TAM EKRAN AĞAÇ SAYFASI ============ */
#geriSayim{background:linear-gradient(180deg,var(--cimen),var(--cimen-koyu));color:var(--krem)}
.zarf.sari .arka{background:linear-gradient(170deg,#f0d9a0,#d9b36a)}
.zarf.sari .on{background:linear-gradient(180deg,#f4e2b4,#e3c078);clip-path:polygon(0 0, 50% 46%, 100% 0, 100% 100%, 0 100%)}
.zarf.sari .kapak{border-top-color:#f7ead0}
.zarf.sari .mektupcuk{color:#8a6b1f}
.zarf.sari .muhur{background:radial-gradient(circle at 35% 30%, #ffe08a, #e9b64c 55%, #a67714)}
.agac-sayfa{
  position:fixed;inset:0;z-index:121;display:none;flex-direction:column;
  background:
    radial-gradient(ellipse at 50% 118%, rgba(63,52,40,.15), transparent 55%),
    linear-gradient(180deg,#f8f1df,#efe4c9);
  color:var(--murekkep);
}
.agac-sayfa.acik{display:flex}
.agac-sayfa .kapat{position:absolute;top:14px;right:14px;z-index:3;background:rgba(63,52,40,.14);border-color:rgba(63,52,40,.25);color:#4a3d2e}
.agac-icerik{overflow-y:auto;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 18px 26px}
.agac-duzen{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px clamp(14px,4vw,44px);max-width:860px}
@media (min-width:720px){ .agac-duzen .agac-not{align-self:center} }

/* ============ YEŞİL AJANDA (çevrilebilir defter) ============ */
.ajanda-alan{display:flex;flex-direction:column;align-items:center;gap:15px;margin-top:52px;padding-bottom:26px;width:100%}
.kitap{position:relative;width:min(700px,96vw);aspect-ratio:2/1.5;perspective:1900px}
.kapak-taban{
  position:absolute;inset:0;border-radius:13px;
  background:
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.06) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,.05) 0 2px, transparent 3px),
    linear-gradient(160deg,#93b243,#7c9a34 60%,#6b862b);
  background-size:46px 46px, 58px 58px, 100% 100%;
  box-shadow:0 26px 55px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.25);
}
.kapak-taban::before{content:"";position:absolute;left:50%;top:6px;bottom:6px;width:4px;transform:translateX(-50%);background:linear-gradient(90deg,rgba(30,45,12,.15),rgba(30,45,12,.45),rgba(30,45,12,.15));border-radius:2px}
/* sağ kenarda sayfa yaprakları izlenimi */
.kapak-taban::after{content:"";position:absolute;right:5px;top:10px;bottom:10px;width:7px;border-radius:0 8px 8px 0;background:repeating-linear-gradient(180deg,#efe6cf 0 3px,#d9cdae 3px 4px);opacity:.9}
.yaprak{
  position:absolute;right:0;top:0;width:50%;height:100%;
  transform-origin:left center;transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.42,.05,.22,1);
}
.yaprak.cevrildi{transform:rotateY(-180deg)}
.yuz{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.yuz.on{border-radius:0 12px 12px 0}
.yuz.arka{transform:rotateY(180deg);border-radius:12px 0 0 12px}
.yuz.deri{
  background:
    radial-gradient(circle at 26% 30%, rgba(255,255,255,.07) 0 2px, transparent 3px),
    radial-gradient(circle at 72% 64%, rgba(0,0,0,.06) 0 2px, transparent 3px),
    linear-gradient(155deg,#9ab84a,#7f9c37 55%,#6d882c);
  background-size:42px 42px, 54px 54px, 100% 100%;
  box-shadow:inset 0 0 26px rgba(40,58,14,.35);
}
.yuz.deri::before{content:"";position:absolute;inset:9px;border:1.6px dashed rgba(60,78,22,.55);border-radius:inherit;pointer-events:none}
.yuz.deri .lastik{position:absolute;top:-2px;bottom:-2px;right:12%;width:13px;background:linear-gradient(90deg,#2f4416,#486320 50%,#2f4416);border-radius:4px;box-shadow:0 0 8px rgba(0,0,0,.35)}
.yuz.deri .kabartma{position:absolute;inset:12% 14% 18%;display:flex;align-items:center;justify-content:center}
.yuz.deri .kabartma svg{width:100%;height:100%}
.yuz.deri .marka{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:'Quicksand',sans-serif;font-weight:600;letter-spacing:3.5px;font-size:.8rem;color:#54691f;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.yuz.kagit{
  color:var(--murekkep);padding:16px 15px 11px;display:flex;flex-direction:column;
  background:
    repeating-linear-gradient(transparent 0 27px, rgba(74,66,52,.16) 27px 28px),
    linear-gradient(160deg,#fbf6e7,#f2ebd4);
}
.yuz.on.kagit{background:
    linear-gradient(90deg, transparent 30px, rgba(184,80,63,.45) 30px, rgba(184,80,63,.45) 31.5px, transparent 31.5px),
    repeating-linear-gradient(transparent 0 27px, rgba(74,66,52,.16) 27px 28px),
    linear-gradient(160deg,#fbf6e7,#f2ebd4);
  padding-left:42px}
.yuz.arka.kagit{background:
    linear-gradient(270deg, transparent 30px, rgba(184,80,63,.45) 30px, rgba(184,80,63,.45) 31.5px, transparent 31.5px),
    repeating-linear-gradient(transparent 0 27px, rgba(74,66,52,.16) 27px 28px),
    linear-gradient(160deg,#fbf6e7,#f2ebd4);
  padding-right:42px}
.yuz.kagit::after{content:"";position:absolute;top:0;bottom:0;width:28px;pointer-events:none}
.yuz.on.kagit::after{left:0;background:linear-gradient(90deg,rgba(0,0,0,.16),transparent)}
.yuz.arka.kagit::after{right:0;background:linear-gradient(270deg,rgba(0,0,0,.16),transparent)}
.aj-tarih{
  align-self:flex-end;position:relative;z-index:2;transform:rotate(2deg);
  background:rgba(233,182,76,.55);color:#5a4526;
  font-family:'Quicksand',sans-serif;font-weight:600;font-size:.68rem;letter-spacing:.5px;
  padding:5px 12px;box-shadow:inset 0 0 6px rgba(0,0,0,.1), 0 2px 5px rgba(0,0,0,.12);
}
.aj-sehir{font-family:'Pinyon Script',cursive;font-size:clamp(1.45rem,5vw,2.2rem);color:var(--kirmizi);line-height:1.05;margin-top:2px;position:relative;z-index:2}
.aj-yazi{font-family:'Caveat',cursive;font-size:clamp(1.05rem,3.6vw,1.35rem);line-height:27.5px;margin-top:5px;flex:1;position:relative;z-index:2}
.aj-no{align-self:center;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.62rem;color:#8a7c62;letter-spacing:1px}
.cikartma{
  position:absolute;z-index:1;width:clamp(44px,13vw,60px);aspect-ratio:1;
  filter:drop-shadow(0 4px 7px rgba(0,0,0,.22));
}
.cikartma svg{width:100%;height:100%;display:block}
.cikartma .emoji-yedek{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#fff;border-radius:14px;font-size:1.5rem;border:1px solid rgba(0,0,0,.06)}
.kitap-kontrol{display:flex;gap:14px;align-items:center}
.kitap-kontrol .buton{padding:10px 18px;font-size:.88rem}
@media (prefers-reduced-motion: reduce){.yaprak{transition-duration:.01s}}

/* yatay anı kartı & dikey video kartı */
.serit-kart.yatay{flex:0 0 min(88vw,420px)}
.serit-kart.yatay img{aspect-ratio:4/3}

.serit-kart.dikey video{aspect-ratio:9/16;max-height:58svh}

/* ============ AJANDA SAYFASI (tam ekran) ============ */
.ajanda-sayfa{
  position:fixed;inset:0;z-index:122;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--cimen-koyu),var(--cimen));
}
.ajanda-sayfa.acik{display:flex}
.ajanda-icerik{overflow-y:auto;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:56px 12px 26px}
.ajanda-sayfa .kitap{width:min(860px,96vw)}
.ajanda-onizleme{
  position:relative;width:min(230px,62vw);aspect-ratio:3/4.1;cursor:pointer;
  border-radius:12px;margin-top:8px;transition:transform .18s;
  background:
    radial-gradient(circle at 26% 30%, rgba(255,255,255,.07) 0 2px, transparent 3px),
    linear-gradient(155deg,#9ab84a,#7f9c37 55%,#6d882c);
  background-size:42px 42px, 100% 100%;
  box-shadow:0 20px 45px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
}
.ajanda-onizleme:active{transform:scale(.95)}
.ajanda-onizleme::before{content:"";position:absolute;inset:8px;border:1.6px dashed rgba(60,78,22,.55);border-radius:8px}
.ajanda-onizleme .lastik{position:absolute;top:-2px;bottom:-2px;right:13%;width:11px;background:linear-gradient(90deg,#2f4416,#486320 50%,#2f4416);border-radius:4px;box-shadow:0 0 8px rgba(0,0,0,.35)}
.ajanda-onizleme .kabartma{position:absolute;inset:16% 15% 22%}
.ajanda-onizleme .kabartma svg{width:100%;height:100%}
.ajanda-onizleme .marka{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Quicksand',sans-serif;font-weight:600;letter-spacing:3px;font-size:.72rem;color:#54691f;text-shadow:0 1px 0 rgba(255,255,255,.4)}

/* ajanda yazı tipi düzeltmesi: satır çizgisine oturan okunaklı el yazısı */
.aj-sehir{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.5rem,5.2vw,2.2rem)}
.aj-yazi{font-family:'Patrick Hand','Caveat',cursive;font-size:clamp(1.02rem,3.5vw,1.3rem);line-height:28px}

/* ============ 0b. TAKVİM (bir bakış) ============ */
#takvim{background:linear-gradient(165deg,#f4ead8,#ecdfc7);color:#6e2430;align-items:center}
.takvim-kutu{width:min(720px,94vw);display:flex;flex-direction:column;gap:14px}
.takvim-ust{font-family:'Quicksand',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:4px;color:#8a2f3f}
.takvim-ay{font-family:'Pinyon Script',cursive;font-size:clamp(2.3rem,9.5vw,3.4rem);line-height:.9;color:#8a2f3f;margin-top:-4px}
table.takvim{width:100%;border-collapse:collapse;table-layout:fixed}
.takvim th{border:1.7px solid #7e2a3a;font-family:'Quicksand',sans-serif;font-weight:600;font-size:clamp(.56rem,2.4vw,.78rem);letter-spacing:1px;padding:11px 0;color:#6e2430}
.takvim td{border:1.7px solid #7e2a3a;height:clamp(66px,17vw,116px);vertical-align:top;position:relative;padding:6px}
.takvim td .gun-no{position:absolute;top:6px;right:8px;font-family:'Quicksand',sans-serif;font-weight:600;font-size:clamp(.74rem,3vw,1rem);z-index:1}
.takvim td.isaretli{overflow:visible}
.takvim td.isaretli .gun-no{color:#fdf6e8;z-index:4}
.takvim td.isaretli .halka{position:absolute;top:1px;right:2px;width:clamp(22px,6.4vw,30px);height:clamp(22px,6.4vw,30px);border-radius:50%;background:#c2453a;box-shadow:0 2px 5px rgba(0,0,0,.25);z-index:3}
.takvim-foto{
  position:absolute;left:-4%;bottom:-4%;width:104%;max-width:none;aspect-ratio:3/4;object-fit:cover;z-index:2;
  border-radius:44% 40% 42% 46% / 46% 44% 42% 40%;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.3));
}
.takvim-pasta{position:absolute;right:-38%;bottom:-16%;width:84%;z-index:3;pointer-events:none}
.takvim-foto.kesik{border-radius:0;aspect-ratio:auto;object-fit:contain;object-position:bottom;width:92%;max-height:118%;left:4%;bottom:-2%}
.takvim-not{align-self:flex-end;font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.25rem,4.8vw,1.6rem);color:#c2453a;transform:rotate(-2.5deg);margin-top:2px}

/* Fav Date: fotoğraflı zemin */
#giris{overflow:hidden}
.giris-fon{position:absolute;inset:0;background-size:cover;background-position:center;background-image:linear-gradient(180deg,var(--cimen-koyu),var(--cimen))}
.giris-perde{position:absolute;inset:0;background:linear-gradient(180deg, rgba(8,20,11,.34) 0%, rgba(8,20,11,.48) 55%, rgba(8,20,11,.72) 100%)}
#giris > *:not(.giris-fon):not(.giris-perde){position:relative;z-index:2}
.giris-metin{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.35rem,5.2vw,1.9rem);line-height:1.55;max-width:560px;
  text-shadow:0 2px 14px rgba(0,0,0,.7), 0 1px 3px rgba(0,0,0,.55);opacity:1;
}
/* sarı zarfın uzun notu için sığdırma */
.zarf.sari .mektupcuk{font-size:.98rem;line-height:1.3;padding:10px 12px;align-items:flex-start;text-align:center}

/* gümüş sürpriz kutusu */
.kutu-gumus .gvd{background:linear-gradient(180deg,#f2f3f5,#d7dade)}
.kutu-gumus .serit{background:linear-gradient(180deg,#c3c9d2,#a9b0bb)}
.kutu-gumus .kpk{background:linear-gradient(180deg,#e8eaee,#cfd3d9)}
.kutu-gumus .fiyonk{border-color:#aab1bc}
.kutu-gumus .dugum{background:#aab1bc}
/* kolye ipucu: sadece 3. hediyenin notunda, kenarlardan usulca sarkar */
.hediye-sayfa .kolye{display:none;position:absolute;pointer-events:none;z-index:1;opacity:.8}
.hediye-sayfa.kolyeli .kolye{display:block}
.kolye svg{display:block;width:100%;height:100%}
.kolye.k1{top:-6px;right:-4px;width:110px;height:110px;transform:rotate(6deg)}
.kolye.k2{bottom:-5px;left:-6px;width:84px;height:84px;transform:rotate(-172deg)}

canvas#fx{position:fixed;inset:0;pointer-events:none;z-index:90}
.muzik-dugme{position:fixed;top:16px;right:16px;z-index:95;width:44px;height:44px;border-radius:50%;border:1px solid rgba(250,243,227,.3);background:rgba(14,34,19,.6);color:var(--krem);font-size:1.1rem;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
@media (prefers-reduced-motion: reduce){
  .plak,.ok{animation:none}
  .belir{transition:none;opacity:1;transform:none}
}

addEventListener("keydown", e => {

/* ---- ŞİFRE ---- */
if (AYAR.kilitArkaplanFoto) {
  $("#kilitFon").style.backgroundImage = `url('${AYAR.kilitArkaplanFoto}')`;
}
const tusTakimi = $("#tusTakimi");
let girilen = "";
[1,2,3,4,5,6,7,8,9,"sil",0,"tamam"].forEach(t => {
  const b = document.createElement("button");
  b.className = "tus" + (typeof t === "string" ? " yardimci" : "");
  b.textContent = t === "sil" ? "⌫" : (t === "tamam" ? "✓" : t);
  b.onclick = () => tusBas(t);
  tusTakimi.appendChild(b);
});
function haneGuncelle(){
  document.querySelectorAll("#asmaKilit .hane").forEach((h, i) => {
    h.textContent = girilen[i] || "";
    h.classList.toggle("dolu", i < girilen.length);
  });
}
function tusBas(t){
  const msj = $("#sifreMesaj");
  if (t === "sil") { girilen = girilen.slice(0, -1); msj.textContent = ""; }
  else if (t === "tamam") { if (girilen.length === 4) kontrolEt(); }
  else if (girilen.length < 4) { girilen += t; msj.textContent = ""; }
  haneGuncelle();
  if (girilen.length === 4 && t !== "tamam") setTimeout(kontrolEt, 250);
}
function kontrolEt(){
  if (girilen === AYAR.sifre) {
    $("#sifreMesaj").textContent = "Doğru! Hoş geldin 🌷";
    $("#asmaKilit").classList.add("acik");   // kanca yukarı atar

    laleFirlat();

      $("#kilitKatman").classList.add("acildi");
      document.body.classList.remove("kilitli");
    }, 1100);
  } else {
    const kilit = $("#asmaKilit");
    kilit.classList.add("hata");
    $("#sifreMesaj").textContent = "Olmadı, bir daha dene 🙈";
    setTimeout(() => { kilit.classList.remove("hata"); girilen = ""; haneGuncelle(); }, 500);

}

/* ---- ALBÜMLER: kapaklar + tam ekran kaydırmalı sayfa ---- */
$("#yasKapakAd").textContent = AYAR.yasBaslik;

const yasVideoSayisi = AYAR.yasFotolari.filter(f => /\.(mp4|webm|mov)$/i.test(f.dosya || "")).length;
const yasFotoSayisi = AYAR.yasFotolari.length - yasVideoSayisi;
$("#yasAdet").textContent = yasVideoSayisi
  ? `${yasFotoSayisi} FOTO · ${yasVideoSayisi} VİDEO`
  : `${yasFotoSayisi} FOTOĞRAF`;
$("#videoAdet").textContent = AYAR.videolar.length + " VİDEO";

function sayacBagla(seritEl, sayacEl){
  function guncelle(){
    const kartlar = seritEl.children;
    if (!kartlar.length) return;
    const orta = seritEl.scrollLeft + seritEl.clientWidth / 2;
    let enYakin = 0, enKucukFark = Infinity;
    for (let i = 0; i < kartlar.length; i++) {
      const merkez = kartlar[i].offsetLeft + kartlar[i].offsetWidth / 2;
      const fark = Math.abs(merkez - orta);
      if (fark < enKucukFark) { enKucukFark = fark; enYakin = i; }
    }
    sayacEl.textContent = (enYakin + 1) + " / " + kartlar.length;
  }
  seritEl.addEventListener("scroll", () => requestAnimationFrame(guncelle), { passive: true });
  guncelle();
  return guncelle;
}
const albumSayacGuncelle = sayacBagla($("#albumSerit"), $("#albumSayac"));

function albumAc(tip){
  const serit = $("#albumSerit");
  serit.innerHTML = "";
  if (tip === "yas") {
    $("#albumBaslik").textContent = AYAR.yasBaslik;
    AYAR.yasFotolari.forEach((f, i) => {
      const k = document.createElement("div");
      const videoMu = /\.(mp4|webm|mov)$/i.test(f.dosya || "");
      k.className = "serit-kart" + (videoMu ? " video-tip" : "") + (f.yatay ? " yatay" : "");
      k.innerHTML = `<div class="no">${i + 1}</div>
        ${f.dosya
          ? (videoMu
              ? `<video src="${f.dosya}" controls playsinline preload="metadata"></video>`
              : `<img src="${f.dosya}" alt="" loading="lazy">`)
          : `<div class="bos">Fotoğraf ${i + 1}</div>`}
        ${f.yazi ? `<div class="aciklama">${f.yazi}</div>` : ""}`;
      serit.appendChild(k);
    });
  } else {
    $("#albumBaslik").textContent = AYAR.videoBaslik;
    AYAR.videolar.forEach((v, i) => {
      if (AYAR.videoBolucuYazi && i + 1 === AYAR.videoBolucuSira) {
        const b = document.createElement("div");
        b.className = "serit-kart bolucu";
        b.innerHTML = `<div>${AYAR.videoBolucuYazi}</div>`;
        serit.appendChild(b);
      }
      const k = document.createElement("div");
      k.className = "serit-kart video-tip" + (v.dikey ? " dikey" : "");
      k.innerHTML = `${v.dosya
          ? `<video src="${v.dosya}" controls playsinline preload="metadata"></video>`
          : `<div class="bos">Video ${i + 1} buraya gelecek 🎬</div>`}
        <div class="yazi aciklama">${v.yazi || ""}</div>`;
      serit.appendChild(k);
    });
  }
  serit.scrollLeft = 0;
  $("#albumSayfa").classList.add("acik");
  document.body.classList.add("tunelde");
  albumSayacGuncelle();
}
function albumKapat(){
  $("#albumSayfa").classList.remove("acik");
  document.body.classList.remove("tunelde");
  document.querySelectorAll("#albumSerit video").forEach(v => v.pause());
}
$("#kapakYas").onclick = () => albumAc("yas");
$("#kapakVideo").onclick = () => albumAc("video");

/* ---- ERASMUS HİKAYEMİZ: bilet + tam ekran dikey yolculuk ---- */
$("#erasmusBaslik").textContent = AYAR.erasmusBaslik;

const yolculuk = $("#yolculuk");
AYAR.erasmusFotolari.forEach((f, i) => {
  const d = document.createElement("div");
  const sol = i % 2 === 0;
  d.className = "durak " + (sol ? "sol" : "sag");
  d.innerHTML = `<span class="pin">📍</span>
    ${f.dosya ? `<img src="${f.dosya}" alt="" loading="lazy">` : `<div class="bos">Fotoğraf ${i + 1}</div>`}
    ${f.baslik ? `<div class="d-baslik">${f.baslik}</div>` : ""}
    ${f.yazi ? `<div class="d-yazi">${f.yazi}</div>` : ""}`;
  yolculuk.appendChild(d);
  const img = d.querySelector("img");
  if (img) img.addEventListener("load", yolCiz);
});
function yolCiz(){
  const kartlar = yolculuk.querySelectorAll(".durak");
  if (kartlar.length < 2) return;
  const kutu = yolculuk.getBoundingClientRect();
  if (!kutu.width) return;   /* sayfa kapalıyken çizme */
  const svg = $("#yolSvg");
  svg.setAttribute("viewBox", `0 0 ${kutu.width} ${kutu.height}`);
  const noktalar = [...kartlar].map(k => {
    const r = k.getBoundingClientRect();
    return { x: r.left - kutu.left + r.width / 2, y: r.top - kutu.top + r.height / 2 };
  });
  let d = `M ${noktalar[0].x} ${noktalar[0].y}`;
  for (let i = 1; i < noktalar.length; i++) {
    const a = noktalar[i - 1], b = noktalar[i];
    const dy = (b.y - a.y) * 0.55;
    d += ` C ${a.x} ${a.y + dy}, ${b.x} ${b.y - dy}, ${b.x} ${b.y}`;
  }
  $("#yolPath").setAttribute("d", d);
}

[1,2,3,4,5,6,7,8,9,"sil",0,"tamam"].forEach(t => {

function miniHane(){
  document.querySelectorAll("#miniAsma .hane").forEach((h, i) => {
    h.textContent = girilenM[i] || "";
    h.classList.toggle("dolu", i < girilenM.length);
  });

function miniTusBas(t){
  const msj = $("#miniMesaj");
  if (t === "sil") { girilenM = girilenM.slice(0, -1); msj.textContent = ""; }
  else if (t === "tamam") { if (girilenM.length === 4) miniKontrol(); }
  else if (girilenM.length < 4) { girilenM += t; msj.textContent = ""; }
  miniHane();
  if (girilenM.length === 4 && t !== "tamam") setTimeout(miniKontrol, 250);
}
function miniKontrol(){
  if (girilenM === AYAR.anilarSifre) {
    anilarAcik = true;
    $("#miniMesaj").textContent = "Doğru! 💚";
    $("#miniAsma").classList.add("acik");
    setTimeout(() => {
      $("#miniKilitSayfa").classList.remove("acik");
      $("#miniAsma").classList.remove("acik");
      girilenM = ""; miniHane(); $("#miniMesaj").textContent = "";
      serideAc();
    }, 1000);

    $("#miniAsma").classList.add("hata");
    $("#miniMesaj").textContent = "Olmadı, bir daha düşün 😉";

    <path d="M50 100 C42 96 38 66 40 34 C46 48 54 48 60 34 C62 66 58 96 50 100 Z" fill="${acik}" opacity=".45"/>
  </svg>`;
}
function gulSvg(palet){
  const id = "cg" + (cicekSayac++);
  const [acik, orta, koyu] = palet;
  let dis = "", ic = "";
  for (let i = 0; i < 8; i++)
    dis += `<path d="M50 4 C66 8 76 26 68 42 C60 32 54 28 50 24 Z" fill="${i % 2 ? orta : acik}" transform="rotate(${i * 45} 50 50)"/>`;
  for (let i = 0; i < 6; i++)
    ic += `<path d="M50 20 C60 23 66 34 61 44 C56 37 52 34 50 31 Z" fill="${i % 2 ? koyu : orta}" transform="rotate(${i * 60 + 22} 50 50)"/>`;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="47" fill="${orta}" opacity=".28"/>
    ${dis}${ic}
    <circle cx="50" cy="50" r="15" fill="${koyu}"/>
    <path d="M50 50 c7 -3 10 6 3 9 c-9 4 -15 -7 -3 -13 c13 -6 21 10 5 18" stroke="${acik}" stroke-width="3" fill="none" stroke-linecap="round"/>
  </svg>`;
}
function papatyaSvg(){
  const id = "cg" + (cicekSayac++);
  let t = "";
  for (let i = 0; i < 12; i++)
    t += `<ellipse cx="50" cy="16" rx="9" ry="19" fill="${i % 2 ? "#ffffff" : "#f6f1e4"}" transform="rotate(${i * 30} 50 50)"/>`;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${t}
    <circle cx="50" cy="50" r="15" fill="#e9b64c"/>
    <circle cx="45" cy="46" r="2.4" fill="#c88f2a"/><circle cx="55" cy="49" r="2.4" fill="#c88f2a"/>
    <circle cx="49" cy="55" r="2.4" fill="#c88f2a"/><circle cx="53" cy="43" r="1.8" fill="#c88f2a"/>
  </svg>`;
}
function tomurcukSvg(palet){
  const id = "cg" + (cicekSayac++);
  const [acik, orta, koyu] = palet;
  let t = "";
  for (let i = 0; i < 5; i++)
    t += `<path d="M50 12 C63 14 66 32 50 40 C34 32 37 14 50 12 Z" fill="${i % 2 ? orta : acik}" transform="rotate(${i * 72} 50 50)"/>`;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${t}
    <circle cx="50" cy="50" r="10" fill="${koyu}"/><circle cx="47" cy="47" r="3.5" fill="${acik}" opacity=".8"/>
  </svg>`;
}
function rastgeleCicek(){
  if (cicekGorselleri.length)
    return `<img src="${cicekGorselleri[Math.floor(Math.random() * cicekGorselleri.length)]}" alt="">`;
  const palet = lalePaletleri[Math.floor(Math.random() * lalePaletleri.length)];
  const z = Math.random();
  if (z < .38) return gulSvg(palet);
  if (z < .58) return papatyaSvg();
  if (z < .8)  return tomurcukSvg(palet);
  return laleSvg(palet);
}
let cicekVideoEl = null, cicekVideoBozuk = false;
function cicekVideoOynat(){
  if (!cicekVideoEl) {
    cicekVideoEl = document.createElement("video");
    cicekVideoEl.className = "cicek-video";
    cicekVideoEl.muted = true;
    cicekVideoEl.playsInline = true;
    cicekVideoEl.setAttribute("playsinline", "");
    cicekVideoEl.preload = "auto";
    cicekVideoEl.src = AYAR.cicekVideo;
    cicekVideoEl.addEventListener("ended", () => {
      cicekVideoEl.classList.remove("gorunur");
      setTimeout(() => cicekVideoEl.pause(), 700);
    });
    cicekVideoEl.addEventListener("error", () => { cicekVideoBozuk = true; });
    $("#laleKatman").appendChild(cicekVideoEl);
  }
  cicekVideoEl.currentTime = 0;
  const soz = cicekVideoEl.play();
  cicekVideoEl.classList.add("gorunur");
  if (soz) soz.catch(() => { cicekVideoBozuk = true; cicekVideoEl.classList.remove("gorunur"); cicekDuvari(); });
}
function laleFirlat(){
  if (AYAR.cicekVideo && !cicekVideoBozuk) { cicekVideoOynat(); return; }
  cicekDuvari();
}
function cicekDuvari(adet = 64){
  const katman = $("#laleKatman");
  for (let i = 0; i < adet; i++) {
    const d = document.createElement("div");
    d.className = "cicek";
    d.style.setProperty("--x", (Math.random() * 104 - 2) + "%");

    d.style.setProperty("--r0", r + "deg");
    d.style.setProperty("--r1", (r + (Math.random() - .5) * 10) + "deg");

    d.style.setProperty("--gecikme", (Math.random() * .85) + "s");
    d.innerHTML = rastgeleCicek();
    katman.appendChild(d);
    d.addEventListener("animationend", () => d.remove());
  }
}

/* ---- SARI ÇİÇEKLİ AĞAÇ + SAYAÇ ---- */
/* kalp taç: kalp eğrisinin içine sarı çiçekler diz */
(function agacKur(){
  const tac = $("#tacGrubu");
  const merkezX = 150, merkezY = 100, xOlcek = 100, yOlcek = 88;
  function kalpIci(x, y){
    const a = x * x + y * y - 1;
    return a * a * a - x * x * y * y * y <= 0;
  }
  function miniCicek(r, ton){
    /* ton: 0 küçük dolgu, 1 açık sarı, 2 altın */
    const petal = ton === 0 ? "#f3c95e" : (ton === 1 ? "#f6c445" : "#e8a52a");
    const merkezR = ton === 0 ? r * .3 : r * .4;
    let taclar = "";
    for (let k = 0; k < 6; k++)
      taclar += `<ellipse cx="0" cy="${(-r * .6).toFixed(1)}" rx="${(r * .36).toFixed(1)}" ry="${(r * .6).toFixed(1)}" fill="${petal}" transform="rotate(${k * 60})"/>`;
    return taclar + `<circle r="${merkezR.toFixed(1)}" fill="${ton === 0 ? "#8a5c1e" : "#5f3d14"}"/>`;
  }
  function ornekle(adet, listeye){
    let deneme = 0;
    while (listeye.length < adet && deneme < 20000) {
      deneme++;
      const x = (Math.random() * 2.9 - 1.45), y = (Math.random() * 2.7 - 1.3);
      if (!kalpIci(x, -y)) continue;
      listeye.push({ x: merkezX + x * xOlcek, y: merkezY + y * yOlcek });
    }
  }
  const buyukler = [], dolgular = [];
  ornekle(310, buyukler);
  ornekle(360, dolgular);      /* 50 küçük dolgu */
  const cicekler = [
    ...dolgular.slice(310).map(c => ({ ...c, r: 3.4 + Math.random() * 2.2, ton: 0 })),
    ...buyukler.map(c => ({ ...c, r: 6 + Math.random() * 5, ton: Math.random() > .5 ? 1 : 2 }))
  ];
  cicekler.sort((a, b) => b.y - a.y);
  let svgIc = "";
  cicekler.forEach((c, i) => {
    const gecikme = (1.25 + i * 0.0042 + Math.random() * .06).toFixed(2);
    svgIc += `<g transform="translate(${c.x.toFixed(1)} ${c.y.toFixed(1)})">
      <g class="cicekcik" style="--d:${gecikme}s">
        <g transform="rotate(${(Math.random() * 60 - 30).toFixed(0)})">${miniCicek(c.r, c.ton)}</g>
      </g></g>`;
  });
  tac.innerHTML = svgIc;
  /* düşen çiçekler: taçtakilerin aynısı, sol taraftan süzülür */
  for (let i = 0; i < 8; i++) {
    const d = document.createElement("span");
    d.className = "dusen";
    const r = 6 + Math.random() * 4;
    d.innerHTML = `<svg width="${r*3}" height="${r*3}" viewBox="${-r*1.5} ${-r*1.5} ${r*3} ${r*3}">${miniCicek(r, Math.random() > .4 ? 1 : 2)}</svg>`;
    d.style.left = (16 + Math.random() * 42) + "%";
    d.style.top = (20 + Math.random() * 18) + "%";
    d.style.setProperty("--dx", (Math.random() * 70 - 45) + "px");
    d.style.setProperty("--ds", (4 + Math.random() * 3) + "s");
    d.style.setProperty("--dd", (Math.random() * 5) + "s");
    $("#agacSahne").appendChild(d);
  }
})();

function sayimGuncelle(){

  const satir = $("#sayimSatir");
  if (kalan <= 0) { satir.textContent = AYAR.sayacBittiYazi; return; }

  satir.innerHTML = `${AYAR.sayacOnEk}: <b>${gun}</b> gün <b>${String(saat).padStart(2,"0")}</b> saat <b>${String(dk).padStart(2,"0")}</b> dakika <b>${String(sn).padStart(2,"0")}</b> saniye`;
}

/* ---- EFEKTLER: konfeti, kalpler, laleler, ateş böcekleri ---- */
const cv = $("#fx"), ctx = cv.getContext("2d");
function boyutla(){ cv.width = innerWidth; cv.height = innerHeight; }
boyutla(); addEventListener("resize", boyutla);
let parcalar = [], kalpModu = true;   /* kalpler ilk andan itibaren dokununca çıkar */
for (let i = 0; i < 9; i++) parcalar.push({
  tip:"f", x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.28,
  r: Math.random()*2.2+1.4, faz: Math.random()*Math.PI*2, omur: 1
});
const renkler = ["#e9b64c","#a63a2e","#faf3e3","#7fa377","#f0c96a","#c6584a"];
function konfeti(adet){
  for (let i = 0; i < adet; i++) parcalar.push({
    tip:"k", x: cv.width/2, y: cv.height*0.4,
    vx:(Math.random()-.5)*14, vy:(Math.random()*-13)-4,
    r:Math.random()*6+3, a:Math.random()*Math.PI, va:(Math.random()-.5)*.3,
    renk:renkler[Math.floor(Math.random()*renkler.length)], omur:1
  });
}
function kalpEkle(x, y){
  for (let i = 0; i < 4; i++) parcalar.push({
    tip:"h", x:x+(Math.random()-.5)*40, y:y,
    vx:(Math.random()-.5)*2, vy:-(Math.random()*2.5+1.5),
    r:Math.random()*14+10, omur:1,
    renk: Math.random() < .3 ? "#e9b64c" : "#c6584a"
  });
}
addEventListener("pointerdown", e => {
  if (e.target.closest && e.target.closest(".hediye3")) return;   // hediye tıklamasında lale var, kalp basmasın
  if (kalpModu) kalpEkle(e.clientX, e.clientY);
});
/* kalpler artık kendiliğinden yağmıyor; sadece dokununca çıkıyor */
function kalpCiz(x, y, r, alfa, renk){
  ctx.save(); ctx.translate(x, y); ctx.scale(r/16, r/16);
  ctx.globalAlpha = alfa; ctx.fillStyle = renk;
  ctx.beginPath();
  ctx.moveTo(0, 5);
  ctx.bezierCurveTo(-8, -4, -16, 2, 0, 14);
  ctx.bezierCurveTo(16, 2, 8, -4, 0, 5);
  ctx.fill(); ctx.restore();
}
function dongu(){
  ctx.clearRect(0, 0, cv.width, cv.height);
  parcalar = parcalar.filter(p => p.tip === "f" || (p.omur > 0 && p.y < cv.height + 60 && p.y > -60));
  for (const p of parcalar) {
    if (p.tip === "f") {
      p.faz += .02;
      p.x += p.vx + Math.sin(p.faz)*.22; p.y += p.vy + Math.cos(p.faz*.8)*.18;
      if (p.x < -20) p.x = cv.width+20; if (p.x > cv.width+20) p.x = -20;
      if (p.y < -20) p.y = cv.height+20; if (p.y > cv.height+20) p.y = -20;
      const isilti = .2 + Math.abs(Math.sin(p.faz*1.6))*.45;
      ctx.save(); ctx.globalAlpha = isilti;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*4);
      g.addColorStop(0, "#f6d98a"); g.addColorStop(1, "transparent");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (p.tip === "k") {
      p.vy += .35; p.x += p.vx; p.y += p.vy; p.a += p.va; p.omur -= .004;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.a);
      ctx.globalAlpha = Math.max(p.omur, 0); ctx.fillStyle = p.renk;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*.6); ctx.restore();
    } else {
      p.x += p.vx + Math.sin(p.y*.02)*.6; p.y += p.vy; p.omur -= .003;
      kalpCiz(p.x, p.y, p.r, Math.max(p.omur, 0), p.renk);
    }
  }
  requestAnimationFrame(dongu);
}
dongu();
